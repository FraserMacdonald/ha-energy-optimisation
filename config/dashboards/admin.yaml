###############################################################################
# ADMIN DASHBOARD – Monitoring, Graphs, Tuning, Algorithm Internals
# File: dashboards/admin.yaml
# Path: lovelace-admin
#
# 4 views: Energy, Jacuzzi, EVs, Grow Tent
# Requires: custom:mushroom cards, custom:mini-graph-card
###############################################################################

views:

  # =========================================================================
  # VIEW 1: ENERGY
  # =========================================================================
  - title: Energy
    path: energy
    icon: mdi:flash
    cards:

      # ── ISSUES BANNER (conditional – watchdog not healthy) ──
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.watchdog_system_health
            state_not: healthy
        card:
          type: custom:mushroom-template-card
          primary: >
            {% set count = state_attr('sensor.watchdog_system_health', 'count_down') | int(0) %}
            {{ count }} System{{ 's' if count != 1 }} Down
          secondary: >
            {{ state_attr('sensor.watchdog_system_health', 'groups_down') | join(', ') }}
          icon: mdi:alert-octagon
          icon_color: red
          tap_action:
            action: navigate
            navigation_path: /lovelace-debug/debug

      # ── ORCHESTRATOR STATUS ──
      - type: custom:mushroom-template-card
        primary: >
          Orchestrator: {{ 'Active' if is_state('input_boolean.energy_orchestrator_enabled', 'on') else 'Off' }}
        secondary: >
          Tier {{ states('input_number.energy_orchestrator_active_tier') | int(8) }}: {{ state_attr('sensor.energy_orchestrator_tier', 'tier_name') | default('Export') }}
          · {{ states('input_select.energy_last_decision') }}
        icon: mdi:robot
        icon_color: >
          {% if is_state('input_boolean.energy_orchestrator_enabled', 'on') %}green
          {% else %}grey{% endif %}

      # ── CURRENT TIER ──
      - type: custom:mushroom-template-card
        primary: >
          {% set t = states('input_number.energy_orchestrator_active_tier') | int(8) %}
          Tier {{ t }}: {{ state_attr('sensor.energy_orchestrator_tier', 'tier_name') | default('Export') }}
        secondary: >
          {% set surplus = states('sensor.energy_solar_surplus_w') | int(0) %}
          Surplus: {{ surplus }}W
          · Remaining: {{ states('input_select.energy_orchestrator_allocation_json') | from_json | default({}) | attr('remaining_w') | default(surplus) | int }}W
        icon: mdi:stairs
        icon_color: >
          {% set t = states('input_number.energy_orchestrator_active_tier') | int(8) %}
          {% if t <= 1 %}red
          {% elif t <= 3 %}orange
          {% elif t <= 5 %}amber
          {% elif t <= 7 %}teal
          {% else %}green{% endif %}

      # ── SYSTEM HEALTH ──
      - type: custom:mushroom-template-card
        primary: >
          Health: {{ states('sensor.watchdog_system_health') | title }}
        secondary: >
          {% set count = state_attr('sensor.watchdog_system_health', 'count_down') | int(0) %}
          {% if count == 0 %}All integrations online
          {% else %}{{ count }} down: {{ state_attr('sensor.watchdog_system_health', 'groups_down') | join(', ') }}{% endif %}
        icon: mdi:shield-check
        icon_color: >
          {% set h = states('sensor.watchdog_system_health') %}
          {% if h == 'healthy' %}green
          {% elif h == 'degraded' %}orange
          {% else %}red{% endif %}

      # ── TARIFF + SURPLUS ──
      - type: custom:mushroom-template-card
        primary: >
          {{ states('sensor.energy_tariff_current') | title }} Tariff
        secondary: >
          {% set surplus = states('sensor.energy_solar_surplus_w') | int(0) %}
          {% if surplus > 0 %}{{ surplus }}W surplus
          {% elif surplus == 0 %}Balanced
          {% else %}Importing {{ surplus | abs }}W from grid{% endif %}
        icon: >
          {% if states('sensor.energy_tariff_current') == 'low' %}mdi:cash-check
          {% else %}mdi:cash{% endif %}
        icon_color: >
          {% if states('sensor.energy_tariff_current') == 'low' %}green
          {% else %}orange{% endif %}

      # ── SOLAR PRODUCTION ──
      - type: custom:mini-graph-card
        name: Solar Production
        entities:
          - entity: sensor.solaredge_current_power
            name: Production
            color: "#FFB300"
        hours_to_show: 12
        points_per_hour: 6
        line_width: 2
        hour24: true
        show:
          labels: true
          points: false
          fill: true

      # ── SOLAR FORECAST OVERVIEW ──
      - type: custom:mushroom-template-card
        primary: >
          Solar: {{ states('input_number.energy_solar_actual_today_kwh') | float(0) | round(1) }} / {{ states('input_number.energy_solar_forecast_today_kwh') | float(0) | round(1) }}kWh
        secondary: >
          {% set current = states('input_number.energy_solar_forecast_current_hour_w') | float(0) %}
          {% set peak = states('input_number.energy_solar_forecast_peak_hour_w') | float(0) %}
          {% set peak_h = states('input_number.energy_solar_forecast_peak_hour') | int(0) %}
          {% set cloud = states('input_number.energy_solar_forecast_cloud_pct') | float(0) %}
          Now: {{ (current / 1000) | round(1) }}kW · Peak: {{ (peak / 1000) | round(1) }}kW@{{ peak_h }}h · Cloud: {{ cloud | int }}%
          · Tomorrow: {{ states('input_number.energy_solar_forecast_tomorrow_kwh') | float(0) | round(1) }}kWh
        icon: mdi:solar-power-variant
        icon_color: >
          {% set cloud = states('input_number.energy_solar_forecast_cloud_pct') | float(50) %}
          {% if cloud < 30 %}amber
          {% elif cloud < 70 %}orange
          {% else %}grey{% endif %}

      # ── FORECAST VS ACTUAL GRAPH ──
      - type: custom:mini-graph-card
        name: Forecast vs Actual
        entities:
          - entity: sensor.solaredge_current_power
            name: Actual
            color: "#FFB300"
          - entity: input_number.energy_solar_forecast_current_hour_w
            name: Forecast
            color: "#42A5F5"
        hours_to_show: 24
        points_per_hour: 2
        line_width: 2
        hour24: true
        show:
          labels: true
          points: false
          fill: false

      # ── FORECAST QUALITY ──
      - type: custom:mushroom-template-card
        primary: >
          Forecast Quality: {{ states('input_select.energy_solar_forecast_quality_rating') }}
        secondary: >
          Nowcast error: {{ states('input_number.energy_solar_forecast_error_pct_t0') | float(0) | round(1) }}%
          · 24h error: {{ states('input_number.energy_solar_forecast_error_pct_t24') | float(0) | round(1) }}%
          · Cal: {{ states('input_number.energy_solar_calibration_factor') | float(0.75) | round(3) }}
        icon: mdi:gauge
        icon_color: >
          {% set score = states('input_number.energy_solar_forecast_quality_score') | float(0) %}
          {% if score >= 80 %}green
          {% elif score >= 60 %}amber
          {% elif score >= 40 %}orange
          {% else %}red{% endif %}

      # ── TODAY'S SAVINGS ──
      - type: custom:mushroom-template-card
        primary: "Today's Savings"
        secondary: >
          Jacuzzi: {{ states('sensor.jacuzzi_daily_savings') }} CHF
        icon: mdi:piggy-bank
        icon_color: green

      # ── ORCHESTRATOR CONTROLS ──
      - type: entities
        title: Controls
        entities:
          - entity: input_boolean.energy_orchestrator_enabled
            name: Orchestrator
          - entity: input_number.energy_ev_buffer_target_soc
            name: EV Buffer Target SOC
          - entity: input_boolean.energy_battery_installed
            name: Battery Installed
          - entity: input_boolean.energy_greenhouse_online
            name: Greenhouse Online

      # ── BATTERY STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.energy_battery_installed
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: >
            Battery: {{ states('sensor.energy_battery_soc') }}%
          secondary: >
            Available: {{ states('sensor.energy_battery_available_kwh') }}kWh
            · Evening target: {{ states('input_number.energy_battery_evening_target_kwh') }}kWh
            · Needs charge: {{ is_state('binary_sensor.energy_battery_needs_evening_charge', 'on') }}
          icon: mdi:battery-high
          icon_color: >
            {% set soc = states('sensor.energy_battery_soc') | int(0) %}
            {% if soc > 70 %}green
            {% elif soc > 30 %}amber
            {% else %}red{% endif %}

      # ── GREENHOUSE STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.energy_greenhouse_online
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: "Greenhouse"
          secondary: >
            Draw: {{ states('sensor.energy_greenhouse_current_draw_kw') }}kW
            · LEDs: {{ states('sensor.energy_greenhouse_led_output_pct') }}%
            · Photoperiod: {{ 'Active' if is_state('binary_sensor.energy_greenhouse_photoperiod_active', 'on') else 'Off' }}
          icon: mdi:greenhouse
          icon_color: >
            {% if is_state('binary_sensor.energy_greenhouse_photoperiod_active', 'on') %}green
            {% else %}grey{% endif %}

      # ── SOLAR FORECAST CONTROLS ──
      - type: entities
        title: Solar Forecast
        entities:
          - entity: input_boolean.energy_solar_forecast_enabled
            name: Forecast Enabled
          - entity: input_number.energy_solar_calibration_factor
            name: Calibration Factor
          - entity: input_select.energy_solar_forecast_last_run
            name: Last Run
          - entity: input_select.energy_solar_forecast_quality_rating
            name: Quality Rating

      # ── ORCHESTRATOR INTERNALS (NEW) ──
      - type: entities
        title: Orchestrator Internals
        entities:
          - entity: input_number.energy_orchestrator_active_tier
            name: Active Tier
          - entity: input_select.energy_orchestrator_allocation_json
            name: Allocation JSON
          - entity: input_select.energy_last_decision
            name: Last Decision
          - entity: input_datetime.energy_orchestrator_last_heartbeat
            name: Last Heartbeat
          - entity: input_number.energy_ev_max_solar_amps
            name: EV Max Solar Amps
          - entity: input_boolean.energy_jacuzzi_heat_allowed
            name: Jacuzzi Heat Allowed
          - entity: input_boolean.energy_ev_solar_charge_allowed
            name: EV Solar Charge Allowed
          - entity: input_boolean.energy_ev_tariff_charge_allowed
            name: EV Tariff Charge Allowed

  # =========================================================================
  # VIEW 2: JACUZZI
  # =========================================================================
  - title: Jacuzzi
    path: jacuzzi
    icon: mdi:hot-tub
    cards:

      # ── CLIMATE CARD ──
      - type: custom:mushroom-climate-card
        entity: climate.jacuzzi
        icon: mdi:hot-tub
        show_temperature_control: false
        fill_container: true
        layout: horizontal
        collapsible_controls: true

      # ── MODE ──
      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.jacuzzi_current_mode') | title }}"
        secondary: >
          Target: {{ states('input_number.jacuzzi_target_temp') }}°C
          | Ambient: {{ states('sensor.la_dole_temperature') }}°C
        icon: mdi:thermometer-water
        icon_color: >
          {% set mode = states('sensor.jacuzzi_current_mode') %}
          {% if mode == 'heating' %}orange
          {% elif mode == 'standby' %}blue
          {% elif mode == 'event' %}green
          {% else %}grey{% endif %}

      # ── EVENT STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: calendar.jacuzzi_schedule
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: "Next Event Active"
          secondary: >
            Smart start: {{ states('sensor.jacuzzi_smart_start_time') }}
            | Heat-up: {{ states('sensor.jacuzzi_heat_up_time_required') }}h
          icon: mdi:calendar-clock
          icon_color: green
          tap_action:
            action: more-info
            entity: calendar.jacuzzi_schedule

      # ── PREDICTION (conditional) ──
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.jacuzzi_heat_up_time_required
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: >
            {% set pred = states('sensor.jacuzzi_predicted_temp_at_event') | float(0) %}
            {% if pred >= 39.0 %}On Track
            {% elif pred >= 37.0 %}Marginal
            {% else %}At Risk{% endif %}
          secondary: >
            Predicted: {{ states('sensor.jacuzzi_predicted_temp_at_event') }}°C at event
            | Max achievable: {{ states('sensor.jacuzzi_max_achievable_temp') }}°C
          icon: >
            {% set pred = states('sensor.jacuzzi_predicted_temp_at_event') | float(0) %}
            {% if pred >= 39.0 %}mdi:check-circle
            {% elif pred >= 37.0 %}mdi:alert-circle
            {% else %}mdi:close-circle{% endif %}
          icon_color: >
            {% set pred = states('sensor.jacuzzi_predicted_temp_at_event') | float(0) %}
            {% if pred >= 39.0 %}green
            {% elif pred >= 37.0 %}orange
            {% else %}red{% endif %}

      # ── STANDBY BOOST STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.jacuzzi_standby_boost_enabled
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: >
            Standby: {{ states('sensor.jacuzzi_effective_standby_temp') }}°C
          secondary: >
            {% set mode = state_attr('sensor.jacuzzi_effective_standby_temp', 'mode') %}
            {% if mode == 'solar_boost' %}Solar boost active
            {% elif mode == 'tariff_boost' %}Low tariff boost active
            {% else %}Normal standby (waiting for cheap energy){% endif %}
          icon: mdi:flash-triangle
          icon_color: >
            {% set mode = state_attr('sensor.jacuzzi_effective_standby_temp', 'mode') %}
            {% if mode == 'solar_boost' %}amber
            {% elif mode == 'tariff_boost' %}green
            {% else %}grey{% endif %}

      # ── BANKING STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: input_number.jacuzzi_banking_target_temp
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: >
            Banking: {{ states('input_number.jacuzzi_banking_target_temp') }}°C
            ({{ states('input_select.jacuzzi_banking_strategy') }})
          secondary: >
            {% set solar_h = states('input_number.jacuzzi_expected_solar_hours') | float(0) %}
            {% set solar_g = states('input_number.jacuzzi_expected_solar_gain_c') | float(0) %}
            Effective: {{ states('sensor.jacuzzi_effective_standby_temp') }}°C
            {% if solar_h > 0 %}| Solar: {{ solar_h }}h (+{{ solar_g | round(1) }}°C){% endif %}
            {% set cal = states.calendar.jacuzzi_schedule %}
            {% if cal is not none and cal.attributes.start_time is defined %}
              | Event: {{ as_timestamp(cal.attributes.start_time) | timestamp_custom('%a %H:%M') }}
            {% endif %}
          icon: mdi:thermometer-chevron-up
          icon_color: >
            {% set strategy = states('input_select.jacuzzi_banking_strategy') %}
            {% if strategy == 'solar' %}amber
            {% elif strategy == 'combined' %}deep-orange
            {% elif strategy == 'low_tariff' %}green
            {% else %}grey{% endif %}
          tap_action:
            action: more-info
            entity: input_number.jacuzzi_banking_target_temp

      # ── FORECAST STATUS (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.jacuzzi_use_forecast
            state: "on"
          - condition: numeric_state
            entity: sensor.jacuzzi_heat_up_time_required
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: >
            Forecast: {{ states('input_number.jacuzzi_forecast_temp_at_event') }}°C at event
          secondary: >
            Current: {{ states('sensor.la_dole_temperature') }}°C
            | Delta: {{ (states('input_number.jacuzzi_forecast_temp_at_event') | float(0) - states('sensor.la_dole_temperature') | float(0)) | round(1) }}°C
          icon: mdi:weather-cloudy-clock
          icon_color: >
            {% set delta = (states('input_number.jacuzzi_forecast_temp_at_event') | float(0) - states('sensor.la_dole_temperature') | float(0)) | abs %}
            {% if delta > 3 %}orange
            {% else %}teal{% endif %}

      # ── TEMPERATURE 6H GRAPH ──
      - type: custom:mini-graph-card
        name: Temperature (6h)
        entities:
          - entity: climate.jacuzzi
            attribute: current_temperature
            name: Water
            color: "#ff6b35"
          - entity: sensor.la_dole_temperature
            name: Ambient
            color: "#4fc3f7"
            y_axis: secondary
        hours_to_show: 6
        points_per_hour: 12
        line_width: 2
        hour24: true
        animate: true
        show:
          labels: true
          points: false
          legend: true
          average: false

      # ── RATE + LOSS ──
      - type: custom:mushroom-template-card
        primary: >
          Rate: {{ states('sensor.jacuzzi_net_heating_rate') }}°C/h
        secondary: >
          Heat loss: {{ states('sensor.jacuzzi_standby_loss_rate') }}°C/h
          | Tariff: {{ states('sensor.energy_tariff_current') }}
        icon: mdi:trending-up
        icon_color: >
          {% if states('sensor.jacuzzi_net_heating_rate') | float(0) > 0 %}orange
          {% else %}blue{% endif %}

      # ── TEMPERATURE 48H GRAPH ──
      - type: custom:mini-graph-card
        name: Temperature (48h)
        entities:
          - entity: climate.jacuzzi
            attribute: current_temperature
            name: Water
            color: "#ff6b35"
          - entity: sensor.la_dole_temperature
            name: Ambient
            color: "#4fc3f7"
            y_axis: secondary
        hours_to_show: 48
        points_per_hour: 4
        line_width: 2
        hour24: true
        show:
          labels: true
          points: false
          legend: true
          average: false

      # ── THERMAL MODEL ──
      - type: custom:mushroom-title-card
        title: Thermal Model
        subtitle: >
          {{ states('sensor.jacuzzi_thermal_model_status') | title }}
          – {{ states('input_number.jacuzzi_model_observation_count') | int }} observations

      - type: entities
        entities:
          - entity: input_number.jacuzzi_effective_power_kw
            name: Effective Power (learned)
          - entity: sensor.jacuzzi_current_k
            name: Current k (loss coeff)
          - entity: sensor.jacuzzi_thermal_capacity
            name: Thermal Capacity
          - entity: sensor.jacuzzi_max_achievable_temp
            name: Max Achievable Temp
          - entity: sensor.jacuzzi_standby_loss_rate
            name: Standby Loss Rate
          - type: divider
          - entity: input_number.jacuzzi_model_heating_observations
            name: Heating Observations
          - entity: input_number.jacuzzi_model_cooling_observations
            name: Cooling Observations
          - entity: sensor.jacuzzi_thermal_model_status
            name: Model Status

      # ── BANKING INTERNALS (NEW) ──
      - type: entities
        title: Banking Internals
        entities:
          - entity: input_number.jacuzzi_banking_target_temp
            name: Banking Target Temp
          - entity: input_select.jacuzzi_banking_strategy
            name: Banking Strategy
          - entity: input_number.jacuzzi_expected_solar_hours
            name: Expected Solar Hours
          - entity: input_number.jacuzzi_expected_solar_gain_c
            name: Expected Solar Gain (°C)

      # ── HEATING PROGRESS (NEW) ──
      - type: entities
        title: Heating Progress
        entities:
          - entity: input_number.energy_jacuzzi_heating_start_temp
            name: Heating Start Temp
          - entity: input_number.energy_jacuzzi_last_progress_temp
            name: Last Progress Temp
          - entity: input_datetime.energy_jacuzzi_last_progress_time
            name: Last Progress Time
          - entity: input_datetime.jacuzzi_heating_start_time
            name: Heating Start Time
          - entity: sensor.jacuzzi_heat_up_time_required
            name: Predicted Heat Hours

      # ── SETTINGS ──
      - type: custom:mushroom-title-card
        title: Settings

      - type: entities
        entities:
          - entity: input_boolean.jacuzzi_automation_enabled
            name: Smart Heating Enabled
          - entity: input_boolean.jacuzzi_solar_priority
            name: Prioritize Solar
          - entity: input_boolean.jacuzzi_manual_override
            name: Manual Override
          - type: divider
          - entity: input_number.jacuzzi_target_temp
            name: Target Temperature
          - entity: input_number.jacuzzi_standby_temp
            name: Standby Temperature
          - entity: input_number.jacuzzi_preheat_buffer
            name: Preheat Buffer
          - type: divider
          - entity: input_number.jacuzzi_effective_power_kw
            name: Effective Heater Power
          - type: divider
          - entity: input_boolean.jacuzzi_use_forecast
            name: Use Weather Forecast
          - entity: input_boolean.jacuzzi_standby_boost_enabled
            name: Standby Energy Banking
          - entity: input_number.jacuzzi_boosted_standby_temp
            name: Boosted Standby Temp
          - entity: input_number.jacuzzi_max_heat_up_hours
            name: Max Heat-Up Time
          - entity: sensor.jacuzzi_minimum_standby_temp
            name: Min Standby (readiness)
          - entity: sensor.jacuzzi_effective_standby_temp
            name: Effective Standby Temp
          - type: divider
          - entity: sensor.jacuzzi_daily_savings
            name: Daily Savings

  # =========================================================================
  # VIEW 3: EVs
  # =========================================================================
  - title: EVs
    path: ev
    icon: mdi:car-electric
    cards:

      # ── CAR STATUS ──
      - type: custom:mushroom-template-card
        primary: "Horace"
        secondary: >
          {{ states('input_number.ev_horace_current_soc') | int }}%
          · {{ states('device_tracker.horace_location') | title }}
          {% if is_state('binary_sensor.horace_plugged', 'on') %}· Plugged{% endif %}
        icon: mdi:car-electric
        icon_color: >
          {% if states('input_number.ev_horace_current_soc') | int > 50 %}green
          {% elif states('input_number.ev_horace_current_soc') | int > 20 %}orange
          {% else %}red{% endif %}

      - type: gauge
        entity: input_number.ev_horace_current_soc
        name: Horace SOC
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#F44336"
          - from: 20
            color: "#FF9800"
          - from: 50
            color: "#4CAF50"

      - type: custom:mushroom-template-card
        primary: "Horatio"
        secondary: >
          {{ states('input_number.ev_horatio_current_soc') | int }}%
          · {{ states('device_tracker.horatio_location') | title }}
          {% if is_state('binary_sensor.horatio_plugged', 'on') %}· Plugged{% endif %}
        icon: mdi:car-electric
        icon_color: >
          {% if states('input_number.ev_horatio_current_soc') | int > 50 %}green
          {% elif states('input_number.ev_horatio_current_soc') | int > 20 %}orange
          {% else %}red{% endif %}

      - type: gauge
        entity: input_number.ev_horatio_current_soc
        name: Horatio SOC
        unit: "%"
        min: 0
        max: 100
        needle: true
        segments:
          - from: 0
            color: "#F44336"
          - from: 20
            color: "#FF9800"
          - from: 50
            color: "#4CAF50"

      # ── TODAY'S TRIPS ──
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: input_number.ev_trip_km_fraser_today
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: "Fraser's Trip Today"
          secondary: >
            {{ states('input_number.ev_trip_km_fraser_today') | int }}km
            · Take {{ states('input_select.ev_fraser_assigned_car') }}
            · Depart {{ states('input_datetime.ev_fraser_departure_time').split(' ')[1][:5] if states('input_datetime.ev_fraser_departure_time') not in ['unknown','unavailable'] else '—' }}
            · SOC at departure: {{ states('input_number.ev_fraser_departure_soc') | int }}%
          icon: mdi:account-arrow-right
          icon_color: blue

      - type: conditional
        conditions:
          - condition: numeric_state
            entity: input_number.ev_trip_km_heather_today
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: "Heather's Trip Today"
          secondary: >
            {{ states('input_number.ev_trip_km_heather_today') | int }}km
            · Take {{ states('input_select.ev_heather_assigned_car') }}
            · Depart {{ states('input_datetime.ev_heather_departure_time').split(' ')[1][:5] if states('input_datetime.ev_heather_departure_time') not in ['unknown','unavailable'] else '—' }}
            · SOC at departure: {{ states('input_number.ev_heather_departure_soc') | int }}%
          icon: mdi:account-arrow-right
          icon_color: pink

      # ── TOMORROW'S TRIPS ──
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: input_number.ev_trip_km_fraser_tomorrow
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: "Fraser Tomorrow"
          secondary: >
            {{ states('input_number.ev_trip_km_fraser_tomorrow') | int }}km
            · Assigned: {{ states('input_select.ev_fraser_assigned_car') }}
          icon: mdi:calendar-arrow-right
          icon_color: light-blue

      - type: conditional
        conditions:
          - condition: numeric_state
            entity: input_number.ev_trip_km_heather_tomorrow
            above: 0
        card:
          type: custom:mushroom-template-card
          primary: "Heather Tomorrow"
          secondary: >
            {{ states('input_number.ev_trip_km_heather_tomorrow') | int }}km
            · Assigned: {{ states('input_select.ev_heather_assigned_car') }}
          icon: mdi:calendar-arrow-right
          icon_color: light-blue

      # ── CHARGING PLAN ──
      - type: entities
        title: Charging Plan
        entities:
          - entity: input_select.ev_night_charge_car
            name: Night Charge Car
            icon: mdi:car-electric
          - entity: input_number.ev_night_charge_target_soc
            name: Target SOC
            icon: mdi:battery-charging-high
          - entity: input_boolean.ev_external_charge_required
            name: External Charge Needed
            icon: mdi:alert-circle
          - entity: input_boolean.ev_solar_mode_enabled
            name: Solar Charging Mode
            icon: mdi:solar-power

      # ── CAR OVERRIDE ──
      - type: entities
        title: Car Override
        entities:
          - entity: input_select.ev_requested_vehicle
            name: "Fraser: Request Specific Car"
            icon: mdi:car-key

      # ── TODAY'S ENERGY ──
      - type: custom:mushroom-template-card
        primary: "Today's Charging"
        secondary: >
          Horace: S={{ states('input_number.ev_horace_solar_kwh_today') | round(1) }}kWh
          · G={{ states('input_number.ev_horace_grid_kwh_today') | round(1) }}kWh
          — Horatio: S={{ states('input_number.ev_horatio_solar_kwh_today') | round(1) }}kWh
          · G={{ states('input_number.ev_horatio_grid_kwh_today') | round(1) }}kWh
        icon: mdi:ev-station
        icon_color: green

      # ── PLANNER DETAILS ──
      - type: custom:mushroom-template-card
        primary: "Planner"
        secondary: >
          {{ states('input_select.ev_last_planner_decision') }}
        icon: mdi:robot
        icon_color: teal

      # ── SETTINGS ──
      - type: entities
        title: Settings
        entities:
          - entity: input_boolean.ev_horace_allow_charging
            name: Horace Allow Charging
          - entity: input_boolean.ev_horatio_allow_charging
            name: Horatio Allow Charging
          - entity: input_boolean.ev_horace_trip_mode
            name: Horace Trip Mode (100%)
          - entity: input_boolean.ev_horatio_trip_mode
            name: Horatio Trip Mode (100%)
          - type: divider
          - entity: input_number.ev_charger_max_amps
            name: Max Charger Amps
          - entity: input_number.ev_horace_charge_limit
            name: Horace Charge Limit
          - entity: input_number.ev_horatio_charge_limit
            name: Horatio Charge Limit

      # ── PLANNER INTERNALS (NEW) ──
      - type: entities
        title: Planner Internals
        entities:
          - entity: input_select.ev_last_planner_decision
            name: Last Planner Decision
          - entity: input_select.ev_night_charge_car
            name: Night Charge Car
          - entity: input_number.ev_night_charge_target_soc
            name: Night Charge Target SOC
          - entity: input_select.ev_fraser_assigned_car
            name: Fraser Assigned Car
          - entity: input_select.ev_heather_assigned_car
            name: Heather Assigned Car
          - entity: input_select.ev_requested_vehicle
            name: Requested Vehicle (Override)

      # ── SOC PREDICTIONS (NEW) ──
      - type: entities
        title: SOC Predictions
        entities:
          - entity: input_number.ev_fraser_departure_soc
            name: Fraser Departure SOC
          - entity: input_number.ev_heather_departure_soc
            name: Heather Departure SOC
          - entity: input_number.ev_fraser_elevation_soc_drop
            name: Fraser Elevation SOC Drop
          - entity: input_number.ev_heather_elevation_soc_drop
            name: Heather Elevation SOC Drop
          - entity: input_number.ev_horace_predicted_soc_home
            name: Horace Predicted SOC at Home
          - entity: input_number.ev_horatio_predicted_soc_home
            name: Horatio Predicted SOC at Home

      # ── ENERGY TRACKING (NEW) ──
      - type: entities
        title: Energy Tracking
        entities:
          - entity: input_number.ev_horace_solar_kwh_today
            name: Horace Solar kWh Today
          - entity: input_number.ev_horace_grid_kwh_today
            name: Horace Grid kWh Today
          - entity: input_number.ev_horatio_solar_kwh_today
            name: Horatio Solar kWh Today
          - entity: input_number.ev_horatio_grid_kwh_today
            name: Horatio Grid kWh Today

      # ── ADVANCED SETTINGS (NEW) ──
      - type: entities
        title: Advanced Settings
        entities:
          - entity: input_number.ev_minimum_soc
            name: Minimum SOC (Buffer)
          - entity: input_number.ev_min_amps
            name: Min Charging Amps
          - entity: input_number.ev_voltage
            name: Charger Voltage
          - entity: input_number.ev_phases
            name: Charger Phases
          - entity: input_number.ev_solar_margin_w
            name: Solar Margin (W)
          - entity: input_number.ev_horace_consumption_factor
            name: Horace Consumption Factor
          - entity: input_number.ev_horatio_consumption_factor
            name: Horatio Consumption Factor

  # =========================================================================
  # VIEW 4: GROW TENT
  # =========================================================================
  - title: Grow Tent
    path: grow-tent
    icon: mdi:sprout
    cards:

      # ── OFFLINE WARNING BANNER (conditional) ──
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.watchdog_system_health
            state_not: healthy
        card:
          type: custom:mushroom-template-card
          primary: "Device Issues Detected"
          secondary: >
            Some grow tent devices may be offline. Check the Debug dashboard.
          icon: mdi:alert-octagon
          icon_color: red
          tap_action:
            action: navigate
            navigation_path: /lovelace-debug/debug

      # ── STATUS HEADER ──
      - type: custom:mushroom-template-card
        primary: >
          {{ states('sensor.grow_tent_stage_display') }}
        secondary: >
          Day {{ states('sensor.grow_tent_days_in_stage') | int }} of stage
          · {{ states('sensor.grow_tent_days_since_planting') | int }} total
          · {{ states('input_select.grow_tent_cultivation_status') | title }}
        icon: mdi:sprout
        icon_color: >
          {% set stage = states('input_select.grow_tent_stage') %}
          {% if 'veg' in stage %}green
          {% elif 'flower' in stage %}purple
          {% elif 'flush' in stage %}blue
          {% elif stage == 'harvest' %}amber
          {% elif stage == 'clones' %}light-green
          {% else %}grey{% endif %}

      - type: custom:mushroom-template-card
        primary: >
          Mode: {{ states('input_select.grow_tent_mode') | title }}
        secondary: >
          {% if is_state('input_boolean.grow_tent_lights_on', 'on') %}Lights ON{% else %}Lights OFF{% endif %}
          · {{ states('sensor.grow_tent_target_led_pct') | int }}% LED
          · {{ states('sensor.grow_tent_target_light_hours') | int }}h photoperiod
        icon: >
          {% if is_state('input_select.grow_tent_mode', 'active') %}mdi:play-circle
          {% elif is_state('input_select.grow_tent_mode', 'shadow') %}mdi:eye
          {% else %}mdi:pause-circle{% endif %}
        icon_color: >
          {% if is_state('input_select.grow_tent_mode', 'active') %}green
          {% elif is_state('input_select.grow_tent_mode', 'shadow') %}orange
          {% else %}grey{% endif %}

      # ── ENVIRONMENT AT A GLANCE ──
      - type: custom:mushroom-template-card
        primary: >
          {{ states('sensor.marshydro_temperature') | float(0) | round(1) }}°C
          · {{ states('sensor.marshydro_humidity') | float(0) | round(0) }}% RH
        secondary: >
          Target: {{ states('input_number.grow_tent_temp_target_lights_on') }}°C on / {{ states('input_number.grow_tent_temp_target_lights_off') }}°C off
          · RH target: {{ states('input_number.grow_tent_humidity_target') }}%
        icon: mdi:thermometer
        icon_color: >
          {% set temp = states('sensor.marshydro_temperature') | float(0) %}
          {% set target = states('input_number.grow_tent_temp_target_lights_on') | float(24) %}
          {% if (temp - target) | abs <= 2 %}green
          {% elif (temp - target) | abs <= 4 %}orange
          {% else %}red{% endif %}

      - type: custom:mushroom-template-card
        primary: >
          VPD: {{ states('sensor.grow_tent_vpd') }} kPa
        secondary: >
          Target: {{ states('sensor.grow_tent_vpd_target') }} kPa
          · Fan: {{ states('sensor.grow_tent_target_fan_speed') | int }}%
        icon: mdi:weather-windy
        icon_color: >
          {% set vpd = states('sensor.grow_tent_vpd') | float(0) %}
          {% set target = states('sensor.grow_tent_vpd_target') | float(1.0) %}
          {% if (vpd - target) | abs <= 0.2 %}green
          {% elif (vpd - target) | abs <= 0.4 %}orange
          {% else %}red{% endif %}

      # ── AIR TEMPERATURE & HUMIDITY – 24h Graph ──
      - type: custom:mini-graph-card
        name: Air Temp & Humidity (24h)
        entities:
          - entity: sensor.marshydro_temperature
            name: Temp
            color: "#ff6b35"
          - entity: sensor.marshydro_humidity
            name: RH
            color: "#4fc3f7"
            y_axis: secondary
        hours_to_show: 24
        points_per_hour: 6
        line_width: 2
        hour24: true
        animate: true
        show:
          labels: true
          points: false
          legend: true
          average: false

      # ── WATER & pH ──
      - type: custom:mushroom-template-card
        primary: >
          Water: {{ states('sensor.temperature') | float(0) | round(1) }}°C
          · pH {{ states('sensor.water_ph') | float(0) | round(1) }}
        secondary: >
          Target: {{ states('input_number.grow_tent_water_temp_target') }}°C
          · pH range: {{ states('input_number.grow_tent_ph_low_limit') }}–{{ states('input_number.grow_tent_ph_high_limit') }}
        icon: mdi:water-thermometer
        icon_color: >
          {% set ph = states('sensor.water_ph') | float(6) %}
          {% set lo = states('input_number.grow_tent_ph_low_limit') | float(5.5) %}
          {% set hi = states('input_number.grow_tent_ph_high_limit') | float(6.5) %}
          {% if ph >= lo and ph <= hi %}green
          {% elif (ph - lo) | abs <= 0.3 or (ph - hi) | abs <= 0.3 %}orange
          {% else %}red{% endif %}

      - type: custom:mushroom-template-card
        primary: >
          Reservoir: {{ states('sensor.grow_tent_reservoir_age') | int }} days old
        secondary: >
          {{ states('input_number.grow_tent_reservoir_litres') | int }}L
          · Changed: {{ states('input_datetime.grow_tent_last_reservoir_change').split(' ')[0] if states('input_datetime.grow_tent_last_reservoir_change') not in ['unknown', 'unavailable'] else 'Never' }}
          {% if is_state('input_boolean.grow_tent_reservoir_change_needed', 'on') %}· CHANGE NEEDED{% endif %}
        icon: mdi:barrel
        icon_color: >
          {% set age = states('sensor.grow_tent_reservoir_age') | int(0) %}
          {% if age < 5 %}green
          {% elif age < 7 %}orange
          {% else %}red{% endif %}

      - type: custom:mini-graph-card
        name: Water Temp & pH (24h)
        entities:
          - entity: sensor.temperature
            name: Water °C
            color: "#42a5f5"
          - entity: sensor.water_ph
            name: pH
            color: "#66bb6a"
            y_axis: secondary
        hours_to_show: 24
        points_per_hour: 6
        line_width: 2
        hour24: true
        show:
          labels: true
          points: false
          legend: true
          average: false

      # ── NUTRIENT RECIPE ──
      - type: entities
        title: Nutrient Recipe (per reservoir)
        entities:
          - entity: sensor.grow_tent_dose_base_volume
            name: Base
            icon: mdi:flask
          - entity: sensor.grow_tent_dose_grow_volume
            name: Grow
            icon: mdi:flask-outline
          - entity: sensor.grow_tent_dose_early_flower_volume
            name: Early Flower
            icon: mdi:flower
          - entity: sensor.grow_tent_dose_late_flower_volume
            name: Late Flower
            icon: mdi:flower-tulip
          - entity: sensor.grow_tent_dose_sanacan_volume
            name: SanaCan
            icon: mdi:bottle-tonic-plus
          - entity: sensor.grow_tent_dose_kalican_volume
            name: KaliCan
            icon: mdi:bottle-tonic

      # ── QUICK ACTIONS ──
      - type: custom:mushroom-chips-card
        chips:
          - type: action
            icon: mdi:fast-forward
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_advance_stage
          - type: action
            icon: mdi:water-sync
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_reservoir_change
          - type: action
            icon: mdi:restart
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_reset_grow
              confirmation:
                text: "Reset for a new grow cycle? This clears all data."
        alignment: center

      - type: grid
        square: false
        columns: 3
        cards:
          - type: custom:mushroom-template-card
            primary: "Advance"
            icon: mdi:fast-forward
            icon_color: green
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_advance_stage
            card_mod:
              style: "ha-card { --ha-card-border-width: 0; }"

          - type: custom:mushroom-template-card
            primary: "Water Change"
            icon: mdi:water-sync
            icon_color: blue
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_reservoir_change
            card_mod:
              style: "ha-card { --ha-card-border-width: 0; }"

          - type: custom:mushroom-template-card
            primary: "New Grow"
            icon: mdi:restart
            icon_color: red
            layout: vertical
            tap_action:
              action: perform-action
              perform_action: script.grow_tent_reset_grow
            card_mod:
              style: "ha-card { --ha-card-border-width: 0; }"

      # ── ENERGY – TODAY ──
      - type: custom:mushroom-template-card
        primary: >
          Today: {{ states('sensor.grow_tent_total_energy_daily') | float(0) | round(1) }}kWh
          · CHF {{ states('sensor.grow_tent_daily_cost') | float(0) | round(2) }}
        secondary: >
          Month: {{ states('sensor.grow_tent_total_energy_monthly') | float(0) | round(1) }}kWh
          · CHF {{ states('sensor.grow_tent_monthly_cost') | float(0) | round(2) }}
        icon: mdi:lightning-bolt
        icon_color: amber

      - type: entities
        title: Energy Breakdown (Today)
        entities:
          - entity: sensor.grow_tent_light_energy_daily
            name: Light
            icon: mdi:lightbulb
          - entity: sensor.grow_tent_heater_energy_daily
            name: Space Heater
            icon: mdi:radiator
          - entity: sensor.grow_tent_aquatic_heater_energy_daily
            name: Water Heater
            icon: mdi:water-boiler
          - entity: sensor.grow_tent_humidifier_energy_daily
            name: Humidifier
            icon: mdi:air-humidifier
          - entity: sensor.grow_tent_water_pump_energy_daily
            name: Water Pump
            icon: mdi:pump
          - entity: sensor.grow_tent_water_circ_energy_daily
            name: Water Circulation
            icon: mdi:rotate-3d-variant
          - entity: sensor.grow_tent_extractor_energy_daily
            name: Extractor
            icon: mdi:fan

      # ── SETTINGS – ENVIRONMENT ──
      - type: entities
        title: Environment Settings
        entities:
          - entity: input_select.grow_tent_mode
            name: System Mode
          - entity: input_select.grow_tent_stage
            name: Growth Stage
          - entity: input_select.grow_tent_cultivation_status
            name: Cultivation Status
          - type: divider
          - entity: input_number.grow_tent_lights_on_hour
            name: Lights On Hour
          - entity: input_number.grow_tent_sunrise_ramp_minutes
            name: Sunrise Ramp
          - entity: input_number.grow_tent_sunset_ramp_minutes
            name: Sunset Ramp
          - type: divider
          - entity: input_number.grow_tent_temp_target_lights_on
            name: Temp Target (Lights On)
          - entity: input_number.grow_tent_temp_target_lights_off
            name: Temp Target (Lights Off)
          - entity: input_number.grow_tent_temp_deadband
            name: Temp Deadband
          - type: divider
          - entity: input_number.grow_tent_humidity_target
            name: Humidity Target
          - entity: input_number.grow_tent_humidity_deadband
            name: Humidity Deadband
          - entity: input_number.grow_tent_fan_min_speed
            name: Fan Min Speed
          - type: divider
          - entity: input_number.grow_tent_water_temp_target
            name: Water Temp Target
          - entity: input_number.grow_tent_water_temp_deadband
            name: Water Temp Deadband

      # ── SETTINGS – pH & DOSING ──
      - type: entities
        title: pH & Dosing Settings
        entities:
          - entity: input_number.grow_tent_ph_target
            name: pH Target
          - entity: input_number.grow_tent_ph_low_limit
            name: pH Low Limit
          - entity: input_number.grow_tent_ph_high_limit
            name: pH High Limit
          - entity: input_number.grow_tent_ph_dose_ml
            name: Dose Amount (ml)
          - entity: input_number.grow_tent_ph_dose_wait_minutes
            name: Wait Between Doses
          - entity: input_number.grow_tent_max_ph_doses_per_hour
            name: Max Doses/Hour
          - type: divider
          - entity: input_number.grow_tent_reservoir_litres
            name: Reservoir Volume
          - entity: input_number.grow_tent_harvest_grams
            name: Harvest Yield (g)
          - entity: sensor.grow_tent_energy_per_gram
            name: Energy per Gram
