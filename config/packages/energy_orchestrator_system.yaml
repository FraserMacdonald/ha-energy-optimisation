###############################################################################
# ENERGY ORCHESTRATOR – SYSTEM PACKAGE
# File: packages/energy_orchestrator_system.yaml
#
# Phase 1C: Output helpers for the energy orchestrator.
# The orchestrator sets grant/deny helpers based on its priority queue algorithm.
# Stage 2 wires these into subsystem automations via the master enable switch.
#
# Note: energy_last_decision uses input_select (not input_text) because
# input_text was removed in HA 2026. The set_options service stores
# arbitrary text as a single option — same pattern as ev_last_planner_decision.
###############################################################################


# =============================================================================
# INPUT BOOLEANS – Master switch and grant/deny flags
# =============================================================================
input_boolean:
  energy_orchestrator_enabled:
    name: "Energy Orchestrator Enabled"
    icon: mdi:toggle-switch

  energy_jacuzzi_heat_allowed:
    name: "Energy Jacuzzi Heat Allowed"
    icon: mdi:hot-tub

  energy_ev_solar_charge_allowed:
    name: "Energy EV Solar Charge Allowed"
    icon: mdi:solar-power

  energy_ev_tariff_charge_allowed:
    name: "Energy EV Tariff Charge Allowed"
    icon: mdi:currency-usd

  energy_battery_installed:
    name: "Energy Battery Installed"
    icon: mdi:battery-check
    initial: false

  energy_greenhouse_online:
    name: "Energy Greenhouse Online"
    icon: mdi:greenhouse
    initial: false


# =============================================================================
# INPUT NUMBERS – Orchestrator output values
# =============================================================================
input_number:
  energy_ev_max_solar_amps:
    name: "Energy EV Max Solar Amps"
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac
    mode: box

  energy_jacuzzi_heating_start_temp:
    name: "Energy Jacuzzi Heating Start Temp"
    min: 0
    max: 45
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
    mode: box

  energy_jacuzzi_last_progress_temp:
    name: "Energy Jacuzzi Last Progress Temp"
    min: 0
    max: 45
    step: 0.1
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    mode: box

  jacuzzi_predicted_heat_hours:
    name: "Jacuzzi Predicted Heat Hours"
    min: 0
    max: 24
    step: 0.1
    unit_of_measurement: "h"
    icon: mdi:timer-outline
    mode: box

  energy_battery_capacity_kwh:
    name: "Energy Battery Capacity kWh"
    min: 0
    max: 500
    step: 1
    unit_of_measurement: "kWh"
    icon: mdi:battery-high
    mode: box
    initial: 0

  energy_battery_min_soc_pct:
    name: "Energy Battery Min SOC %"
    min: 5
    max: 30
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-low
    mode: box
    initial: 10

  energy_battery_evening_target_kwh:
    name: "Energy Battery Evening Target kWh"
    min: 0
    max: 50
    step: 1
    unit_of_measurement: "kWh"
    icon: mdi:battery-clock
    mode: box
    initial: 8

  energy_ev_buffer_target_soc:
    name: "Energy EV Buffer Target SOC"
    min: 50
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:car-battery
    mode: box
    initial: 80

  energy_orchestrator_active_tier:
    name: "Energy Orchestrator Active Tier"
    min: 0
    max: 8
    step: 1
    icon: mdi:stairs
    mode: box
    initial: 8


# =============================================================================
# INPUT DATETIMES – Progress tracking timestamps
# =============================================================================
input_datetime:
  energy_jacuzzi_last_progress_time:
    name: "Energy Jacuzzi Last Progress Time"
    icon: mdi:clock-check
    has_date: true
    has_time: true

  jacuzzi_heating_start_time:
    name: "Jacuzzi Heating Start Time"
    icon: mdi:clock-start
    has_date: true
    has_time: true

  energy_orchestrator_last_heartbeat:
    name: "Energy Orchestrator Last Heartbeat"
    icon: mdi:heart-pulse
    has_date: true
    has_time: true


# =============================================================================
# INPUT SELECTS – Text storage (HA 2026 input_text workaround)
# =============================================================================
input_select:
  energy_last_decision:
    name: "Energy Last Decision"
    icon: mdi:clipboard-text-clock
    options:
      - "none"

  energy_orchestrator_allocation_json:
    name: "Energy Orchestrator Allocation JSON"
    icon: mdi:code-json
    options:
      - "{}"
