###############################################################################
# ENERGY SOLAR FORECAST – SYSTEM PACKAGE
# File: packages/energy_solar_forecast_system.yaml
#
# Helpers for the solar production forecast system and supply planner.
# The forecast engine (scripts/solar_forecast.py) writes to these helpers.
# Automations in energy_solar_forecast_automations.yaml trigger the engine.
###############################################################################


# =============================================================================
# INPUT BOOLEANS – Master switch
# =============================================================================
input_boolean:
  energy_solar_forecast_enabled:
    name: "Solar Forecast Enabled"
    icon: mdi:weather-sunny
    initial: true

  energy_solar_snow_on_roof:
    name: "Solar Snow on Roof"
    icon: mdi:snowflake
    initial: false


# =============================================================================
# INPUT NUMBERS – Forecast outputs and configuration
# =============================================================================
input_number:
  # --- Forecast outputs (written by solar_forecast.py forecast) ---
  energy_solar_forecast_today_kwh:
    name: "Solar Forecast Today"
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"
    icon: mdi:solar-power-variant
    mode: box

  energy_solar_forecast_tomorrow_kwh:
    name: "Solar Forecast Tomorrow"
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"
    icon: mdi:solar-power-variant-outline
    mode: box

  energy_solar_forecast_current_hour_w:
    name: "Solar Forecast Current Hour"
    min: 0
    max: 25000
    step: 1
    unit_of_measurement: "W"
    icon: mdi:flash
    mode: box

  energy_solar_forecast_next_hour_w:
    name: "Solar Forecast Next Hour"
    min: 0
    max: 25000
    step: 1
    unit_of_measurement: "W"
    icon: mdi:flash-outline
    mode: box

  energy_solar_forecast_peak_hour_w:
    name: "Solar Forecast Peak Hour Power"
    min: 0
    max: 25000
    step: 1
    unit_of_measurement: "W"
    icon: mdi:arrow-up-bold
    mode: box

  energy_solar_forecast_peak_hour:
    name: "Solar Forecast Peak Hour"
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-outline
    mode: box

  energy_solar_forecast_clear_sky_today_kwh:
    name: "Solar Clear-Sky Today"
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"
    icon: mdi:white-balance-sunny
    mode: box

  energy_solar_forecast_cloud_pct:
    name: "Solar Forecast Cloud Cover"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:cloud-percent
    mode: box

  # --- Actual production (written by solar_forecast.py actual) ---
  energy_solar_actual_today_kwh:
    name: "Solar Actual Today"
    min: 0
    max: 200
    step: 0.01
    unit_of_measurement: "kWh"
    icon: mdi:solar-panel-large
    mode: box

  # --- Error metrics (written by solar_forecast.py compare) ---
  energy_solar_forecast_error_pct_t0:
    name: "Solar Forecast Error (Nowcast)"
    min: 0
    max: 200
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:target
    mode: box

  energy_solar_forecast_error_pct_t24:
    name: "Solar Forecast Error (24h Ahead)"
    min: 0
    max: 200
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:target-variant
    mode: box

  energy_solar_forecast_quality_score:
    name: "Solar Forecast Quality Score"
    min: 0
    max: 100
    step: 1
    icon: mdi:gauge
    mode: box

  # --- Calibration: per-array (read/write by solar_forecast.py) ---
  energy_solar_calibration_factor:
    name: "Solar Calibration Factor (legacy)"
    min: 0.1
    max: 2.0
    step: 0.001
    initial: 0.75
    icon: mdi:tune-vertical
    mode: box

  energy_solar_calibration_east:
    name: "Solar Calibration East Array"
    min: 0.1
    max: 2.0
    step: 0.001
    initial: 0.75
    icon: mdi:tune-vertical
    mode: box

  energy_solar_calibration_west:
    name: "Solar Calibration West Array"
    min: 0.1
    max: 2.0
    step: 0.001
    initial: 0.75
    icon: mdi:tune-vertical
    mode: box

  # --- Cloud bias correction per horizon bucket ---
  energy_cloud_bias_t0:
    name: "Cloud Bias Correction (Nowcast)"
    min: -50
    max: 50
    step: 0.1
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:cloud-sync
    mode: box

  energy_cloud_bias_t6:
    name: "Cloud Bias Correction (6h)"
    min: -50
    max: 50
    step: 0.1
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:cloud-sync
    mode: box

  energy_cloud_bias_t12:
    name: "Cloud Bias Correction (12h)"
    min: -50
    max: 50
    step: 0.1
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:cloud-sync
    mode: box

  energy_cloud_bias_t24:
    name: "Cloud Bias Correction (24h)"
    min: -50
    max: 50
    step: 0.1
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:cloud-sync
    mode: box

  energy_cloud_bias_t36:
    name: "Cloud Bias Correction (36h)"
    min: -50
    max: 50
    step: 0.1
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:cloud-sync
    mode: box

  # --- Supply Planner outputs (written by solar_forecast.py plan) ---
  energy_plan_ev_amps:
    name: "Plan EV Amps"
    min: 0
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac
    mode: box

  energy_plan_48h_cost_chf:
    name: "Plan 48h Projected Cost"
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: "CHF"
    icon: mdi:cash
    mode: box

  energy_plan_48h_savings_chf:
    name: "Plan 48h Savings vs Naive"
    min: 0
    max: 100
    step: 0.01
    unit_of_measurement: "CHF"
    icon: mdi:piggy-bank
    mode: box

  energy_plan_self_consumption:
    name: "Plan Self-Consumption %"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:solar-power
    mode: box

  energy_plan_grid_peak_kwh:
    name: "Plan Peak-Tariff Grid Draw"
    min: 0
    max: 500
    step: 0.01
    unit_of_measurement: "kWh"
    icon: mdi:transmission-tower-import
    mode: box


# =============================================================================
# INPUT SELECTS – Text storage (HA 2026 input_text workaround)
# =============================================================================
input_select:
  energy_solar_forecast_last_run:
    name: "Solar Forecast Last Run"
    icon: mdi:clock-check
    options:
      - "none"

  energy_solar_forecast_quality_rating:
    name: "Solar Forecast Quality"
    icon: mdi:star-circle
    options:
      - "none"

  energy_plan_current_action:
    name: "Plan Current Action"
    icon: mdi:play-circle
    options:
      - "Idle"
      - "Jac"
      - "EV"
      - "Jac+EV"
      - "Export"

  energy_plan_next_change:
    name: "Plan Next Change"
    icon: mdi:calendar-clock
    options:
      - "none"

  energy_plan_status:
    name: "Plan Status"
    icon: mdi:check-circle
    options:
      - "none"
