# =============================================================================
# INPUT SELECTS - Dropdown choices
# =============================================================================
input_select:
  # --- Car Assignments ---
  ev_long_trip_car:
    name: "Long Trip Car"
    options:
      - "None"
      - "Horace"
      - "Horatio"
    icon: mdi:car

  ev_night_charge_car:
    name: "Night Charge Car"
    options:
      - "None"
      - "Horace"
      - "Horatio"
    icon: mdi:car-electric

  ev_fraser_assigned_car:
    name: "Fraser Assigned Car"
    options:
      - "None"
      - "Horace"
      - "Horatio"
    icon: mdi:car-key

  ev_heather_assigned_car:
    name: "Heather Assigned Car"
    options:
      - "None"
      - "Horace"
      - "Horatio"
    icon: mdi:car-key

  ev_requested_vehicle:
    name: "Plug-In Requested Vehicle"
    options:
      - "None"
      - "Horace"
      - "Horatio"
    icon: mdi:ev-plug-type2

  ev_fraser_stops_json:
    name: "Fraser Tomorrow Stops (JSON)"
    icon: mdi:code-json
    options:
      - "none"

  ev_heather_stops_json:
    name: "Heather Tomorrow Stops (JSON)"
    icon: mdi:code-json
    options:
      - "none"

  ev_fraser_trip_legs_json:
    name: "Fraser Trip Legs (JSON)"
    icon: mdi:code-json
    options:
      - "none"

  ev_heather_trip_legs_json:
