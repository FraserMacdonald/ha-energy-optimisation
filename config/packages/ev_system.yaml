    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_heather_leg_1_arrive_soc:
    name: "Heather Leg 1 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_heather_leg_2_arrive_soc:
    name: "Heather Leg 2 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_heather_leg_3_arrive_soc:
    name: "Heather Leg 3 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_heather_leg_4_arrive_soc:
    name: "Heather Leg 4 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_heather_leg_5_arrive_soc:
    name: "Heather Leg 5 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  # --- Leg count (how many legs are valid) ---
  ev_fraser_leg_count:
    name: "Fraser Trip Leg Count"
    min: 0
    max: 6
    step: 1
    icon: mdi:counter

  ev_heather_leg_count:
    name: "Heather Trip Leg Count"
    min: 0
    max: 6
    step: 1
    icon: mdi:counter

  # --- Cooldown Timers ---
  ev_plug_request_cooldown_min:
    name: "Plug Request Cooldown"
    min: 15
    max: 180
    step: 15
    unit_of_measurement: "min"
    icon: mdi:timer-outline
    initial: 60

  ev_swap_request_cooldown_min:
    name: "Swap Request Cooldown"
    min: 15
    max: 180
    step: 15
