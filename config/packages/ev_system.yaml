###############################################################################
# EV SYSTEM – HELPER DEFINITIONS
# File: packages/ev_system.yaml
#
# All helpers for the EV charging and trip planning system.
# Defined in YAML (not UI) for version control.
#
# Phase 1A: 6 helpers renamed to add ev_ prefix
#   horace_allow_charging → ev_horace_allow_charging
#   horatio_allow_charging → ev_horatio_allow_charging
#   horace_trip_mode → ev_horace_trip_mode
#   horatio_trip_mode → ev_horatio_trip_mode
#   horace_charge_limit → ev_horace_charge_limit
#   horatio_charge_limit → ev_horatio_charge_limit
#
# NOTE: Trip leg data stored via input_select.set_options (compacted JSON,
# max 255 chars). For days with many stops, event titles are truncated.
###############################################################################

# =============================================================================
# INPUT BOOLEANS - On/Off flags and modes
# =============================================================================
input_boolean:
  # --- System Modes ---
  ev_solar_mode_enabled:
    name: "EV Solar Charging Mode"
    icon: mdi:solar-power

  ev_horace_allow_charging:
    name: "Horace Allow Charging"
    icon: mdi:ev-station
    initial: true

  ev_horatio_allow_charging:
    name: "Horatio Allow Charging"
    icon: mdi:ev-station
    initial: true

  ev_horace_trip_mode:
    name: "Horace Trip Mode (100% charge)"
    icon: mdi:road-variant

  ev_horatio_trip_mode:
    name: "Horatio Trip Mode (100% charge)"
    icon: mdi:road-variant

  # --- External Charging Warnings ---
  ev_external_charge_required:
    name: "External Charging Required"
    icon: mdi:alert-circle

  ev_horace_charged_externally_today:
    name: "Horace Charged Externally Today"
    icon: mdi:battery-charging-outline

  ev_horatio_charged_externally_today:
    name: "Horatio Charged Externally Today"
    icon: mdi:battery-charging-outline

  # --- Climate Confirmation Flags ---
  ev_horace_climate_active:
    name: "Horace Climate Currently Active"
    icon: mdi:fan

  ev_horatio_climate_active:
    name: "Horatio Climate Currently Active"
    icon: mdi:fan


# =============================================================================
# INPUT NUMBERS - Numeric values and measurements
# =============================================================================
input_number:
  # --- Charger Configuration ---
  ev_charger_max_amps:
    name: "Charger Max Amps"
    min: 6
    max: 32
    step: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac
    initial: 16

  ev_min_amps:
    name: "Minimum Charging Amps"
    min: 1
    max: 16
    step: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac
    initial: 5

  ev_voltage:
    name: "Grid Voltage"
    min: 200
    max: 250
    step: 1
    unit_of_measurement: "V"
    icon: mdi:flash
    initial: 230

  ev_phases:
    name: "Charger Phases"
    min: 1
    max: 3
    step: 1
    icon: mdi:sine-wave
    initial: 3

  ev_solar_margin_w:
    name: "Solar Margin (Watts)"
    min: -500
    max: 2000
    step: 50
    unit_of_measurement: "W"
    icon: mdi:solar-power
    initial: -200

  # --- Minimum SOC (maintenance charging threshold) ---
  ev_minimum_soc:
    name: "EV Minimum SOC (Maintenance)"
    min: 10
    max: 80
    step: 5
    initial: 50
    unit_of_measurement: "%"
    icon: mdi:battery-alert-variant-outline

  # --- Charge Limits (synced to Tesla) ---
  ev_horace_charge_limit:
    name: "Horace Charge Limit"
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-charging-80
    initial: 80

  ev_horatio_charge_limit:
    name: "Horatio Charge Limit"
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-charging-80
    initial: 80

  # --- Trip Distances (Today) ---
  ev_trip_km_fraser_today:
    name: "Fraser Today Trip Distance"
    min: 0
    max: 1000
    step: 1
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance

  ev_trip_km_heather_today:
    name: "Heather Today Trip Distance"
    min: 0
    max: 1000
    step: 1
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance

  # --- Trip Distances (Tomorrow) ---
  ev_trip_km_fraser_tomorrow:
    name: "Fraser Tomorrow Trip Distance"
    min: 0
    max: 1000
    step: 1
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance

  ev_trip_km_heather_tomorrow:
    name: "Heather Tomorrow Trip Distance"
    min: 0
    max: 1000
    step: 1
    unit_of_measurement: "km"
    icon: mdi:map-marker-distance

  ev_horace_consumption_factor:
    name: "Horace Consumption Correction Factor"
    min: 0.5
    max: 2.0
    step: 0.01
    initial: 1.0
    icon: mdi:tune

  ev_horatio_consumption_factor:
    name: "Horatio Consumption Correction Factor"
    min: 0.5
    max: 2.0
    step: 0.01
    initial: 1.0
    icon: mdi:tune

  ev_fraser_elevation_soc_drop:
    name: "Fraser Elevation-Adjusted SOC Drop"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:elevation-rise

  ev_heather_elevation_soc_drop:
    name: "Heather Elevation-Adjusted SOC Drop"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:elevation-rise

  # --- Travel Times ---
  ev_fraser_travel_minutes:
    name: "Fraser Travel Time to First Event"
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "min"
    icon: mdi:clock-outline

  ev_heather_travel_minutes:
    name: "Heather Travel Time to First Event"
    min: 0
    max: 300
    step: 1
    unit_of_measurement: "min"
    icon: mdi:clock-outline

  # --- SOC Tracking ---
  ev_horace_current_soc:
    name: "Horace Current SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery

  ev_horatio_current_soc:
    name: "Horatio Current SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery

  ev_horace_previous_soc:
    name: "Horace Previous SOC Reading"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-clock

  ev_horatio_previous_soc:
    name: "Horatio Previous SOC Reading"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-clock

  ev_horace_predicted_soc_home:
    name: "Horace Predicted SOC at Home"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-arrow-down

  ev_horatio_predicted_soc_home:
    name: "Horatio Predicted SOC at Home"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-arrow-down

  # --- Departure SOC Predictions ---
  ev_fraser_departure_soc:
    name: "Fraser Expected Departure SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  ev_heather_departure_soc:
    name: "Heather Expected Departure SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  # --- External Charging Tracking ---
  ev_horace_external_kwh_today:
    name: "Horace External kWh Today"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:battery-plus-variant

  ev_horatio_external_kwh_today:
    name: "Horatio External kWh Today"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:battery-plus-variant

  ev_external_charge_kwh_fraser:
    name: "Fraser External Charge Needed"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:battery-alert

  ev_external_charge_kwh_heather:
    name: "Heather External Charge Needed"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "kWh"
    icon: mdi:battery-alert

  # --- Planner Outputs ---
  ev_night_charge_target_soc:
    name: "Night Charge Target SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-charging-100

  ev_required_start_soc:
    name: "Required Starting SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-check

  # --- Per-Leg SOC Data (numeric, one per leg, max 6 legs per driver) ---
  # These store the SOC at arrival for each trip leg
  ev_fraser_leg_0_arrive_soc:
    name: "Fraser Leg 0 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_fraser_leg_1_arrive_soc:
    name: "Fraser Leg 1 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_fraser_leg_2_arrive_soc:
    name: "Fraser Leg 2 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_fraser_leg_3_arrive_soc:
    name: "Fraser Leg 3 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_fraser_leg_4_arrive_soc:
    name: "Fraser Leg 4 Arrive SOC"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery-outline

  ev_fraser_leg_5_arrive_soc:
    name: "Fraser Leg 5 Arrive SOC"
    min: 0
