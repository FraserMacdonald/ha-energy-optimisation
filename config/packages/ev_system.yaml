    icon: mdi:code-json
    options:
      - "none"

  ev_trip_digest_signature:
    name: "Trip Digest Signature"
    icon: mdi:fingerprint
    options:
      - "none"

  ev_elevation_summary:
    name: "Elevation Calculation Summary"
