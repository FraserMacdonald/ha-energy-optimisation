###############################################################################
# JACUZZI SYSTEM – HELPER DEFINITIONS
# File: packages/jacuzzi_system.yaml
#
# All helpers for the jacuzzi heating optimisation system.
# Defined in YAML (not UI) for version control.
#
# Phase 1A: Migrated from jacuzzi_helpers.yaml
#   Bug fix: jacuzzi_calendar_entity changed from input_text to input_select
###############################################################################

# =============================================================================
# INPUT NUMBERS
# =============================================================================
input_number:
  jacuzzi_target_temp:
    name: "Jacuzzi Target Temperature"
    min: 15
    max: 40
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer

  jacuzzi_standby_temp:
    name: "Jacuzzi Standby Temperature"
    min: 10
    max: 30
    step: 0.5
    initial: 15
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low

  jacuzzi_preheat_buffer:
    name: "Jacuzzi Preheat Buffer Time"
    min: 0
    max: 120
    step: 15
    initial: 30
    unit_of_measurement: "min"
    icon: mdi:clock-fast

  jacuzzi_heat_rate_summer:
    name: "Jacuzzi Heating Rate (Summer)"
    min: 1
    max: 10
    step: 0.5
    initial: 5
    unit_of_measurement: "°C/h"
    icon: mdi:trending-up

  jacuzzi_heat_rate_winter:
    name: "Jacuzzi Heating Rate (Winter)"
    min: 1
    max: 10
    step: 0.5
    initial: 3
    unit_of_measurement: "°C/h"
    icon: mdi:trending-up

  jacuzzi_heat_loss_rate:
    name: "Jacuzzi Heat Loss Rate (Standby)"
    min: 0.1
    max: 5
    step: 0.1
    initial: 0.5
    unit_of_measurement: "°C/h"
    icon: mdi:trending-down

  # --- Thermal Model (Physics-Based) ---
  jacuzzi_volume_litres:
    name: "Jacuzzi Volume (litres)"
    min: 500
    max: 5000
    step: 50
    initial: 3200
    unit_of_measurement: "L"
    icon: mdi:cup-water

  jacuzzi_heater_power_rated_kw:
    name: "Jacuzzi Rated Heater Power"
    min: 1
    max: 12
    step: 0.1
    initial: 3.0
    unit_of_measurement: "kW"
    icon: mdi:lightning-bolt

  jacuzzi_effective_power_kw:
    name: "Jacuzzi Effective Heater Power (learned)"
    min: 0.5
    max: 12
    step: 0.01
    initial: 3.7
    unit_of_measurement: "kW"
    icon: mdi:lightning-bolt-circle

  jacuzzi_k_cold:
    name: "Heat Loss Coefficient - Cold (<5°C outdoor)"
    min: 0.005
    max: 0.2
    step: 0.001
    initial: 0.040
    unit_of_measurement: "kW/°C"
    icon: mdi:snowflake-thermometer

  jacuzzi_k_mild:
    name: "Heat Loss Coefficient - Mild (5-15°C outdoor)"
    min: 0.005
    max: 0.2
    step: 0.001
    initial: 0.035
    unit_of_measurement: "kW/°C"
    icon: mdi:thermometer

  jacuzzi_k_warm:
    name: "Heat Loss Coefficient - Warm (>15°C outdoor)"
    min: 0.005
    max: 0.2
    step: 0.001
    initial: 0.025
    unit_of_measurement: "kW/°C"
    icon: mdi:weather-sunny

  jacuzzi_last_sample_temp:
    name: "Thermal Model Last Sample Temp"
    min: 0
    max: 50
    step: 0.1
    initial: 20
    unit_of_measurement: "°C"
    icon: mdi:thermometer-check

  jacuzzi_last_sample_ambient:
    name: "Thermal Model Last Sample Ambient"
    min: -20
    max: 45
    step: 0.1
    initial: 10
    unit_of_measurement: "°C"
    icon: mdi:thermometer-check

  jacuzzi_model_observation_count:
    name: "Thermal Model Observation Count"
    min: 0
    max: 100000
    step: 1
    initial: 0
    icon: mdi:counter

  jacuzzi_model_heating_observations:
    name: "Thermal Model Heating Observations"
    min: 0
    max: 100000
    step: 1
    initial: 0
    icon: mdi:counter

  jacuzzi_model_cooling_observations:
    name: "Thermal Model Cooling Observations"
    min: 0
    max: 100000
    step: 1
    initial: 0
    icon: mdi:counter

# =============================================================================
# INPUT BOOLEANS
# =============================================================================
input_boolean:
  jacuzzi_automation_enabled:
    name: "Jacuzzi Smart Heating Enabled"
    icon: mdi:auto-mode

  jacuzzi_manual_override:
    name: "Jacuzzi Manual Override"
    icon: mdi:hand-back-right

  jacuzzi_solar_priority:
    name: "Jacuzzi Prioritize Solar Heating"
    initial: true
    icon: mdi:solar-power

  jacuzzi_maintenance_mode:
    name: "Jacuzzi Maintenance Mode"
    icon: mdi:wrench

  jacuzzi_emergency_stop:
    name: "Jacuzzi Emergency Stop"
    icon: mdi:stop-circle

  jacuzzi_heater_upgrade_pending:
    name: "Jacuzzi Heater Upgrade Pending"
    icon: mdi:wrench-clock

# =============================================================================
# INPUT DATETIMES
# =============================================================================
input_datetime:
  jacuzzi_override_until:
    name: "Jacuzzi Override Until"
    has_date: true
    has_time: true
    icon: mdi:clock-end

  jacuzzi_last_sample_time:
    name: "Thermal Model Last Sample Time"
    has_date: true
    has_time: true
    icon: mdi:clock-check

# =============================================================================
# INPUT SELECTS
# Bug fix: was input_text (no validation). Changed to input_select.
# =============================================================================
input_select:
  jacuzzi_last_sample_heater_state:
    name: "Thermal Model Last Heater State"
    options:
      - "heating"
      - "idle"
      - "unknown"
    initial: "unknown"
    icon: mdi:fire-alert

  jacuzzi_calendar_entity:
    name: "Jacuzzi Calendar Entity"
    options:
      - "calendar.jacuzzi_schedule"
      - "calendar.family"
    icon: mdi:calendar
