###############################################################################
# CONFIGURATION.YAML – Main Home Assistant Configuration
# Phase 1A – Restructured with packages and subdirectory includes
###############################################################################

default_config:

frontend:
  themes: !include_dir_merge_named themes

# =============================================================================
# DASHBOARDS (YAML-defined, version-controlled)
# =============================================================================
lovelace:
  mode: storage
  dashboards:
    lovelace-jacuzzi:
      mode: yaml
      filename: dashboards/jacuzzi.yaml
      title: Jacuzzi
      icon: mdi:hot-tub
      require_admin: false
      show_in_sidebar: true
    lovelace-ev:
      mode: yaml
      filename: dashboards/ev.yaml
      title: EVs
      icon: mdi:car-electric
      require_admin: false
      show_in_sidebar: true
    lovelace-energy:
      mode: yaml
      filename: dashboards/energy.yaml
      title: Energy
      icon: mdi:flash
      require_admin: false
      show_in_sidebar: true
    lovelace-grow-tent:
      mode: yaml
      filename: dashboards/grow_tent.yaml
      title: Grow Tent
      icon: mdi:sprout
      require_admin: false
      show_in_sidebar: true

# =============================================================================
# PACKAGES (all helpers + related config per system)
# =============================================================================
homeassistant:
  packages:
    jacuzzi: !include packages/jacuzzi_system.yaml
    ev_system: !include packages/ev_system.yaml
    energy_orchestrator: !include packages/energy_orchestrator_system.yaml
    energy_solar_forecast: !include packages/energy_solar_forecast_system.yaml
    # --- Grow Tent (6 package files) ---
    grow_tent_system: !include packages/grow_tent/grow_tent_system.yaml
    grow_tent_sensors: !include packages/grow_tent/grow_tent_sensors.yaml
    grow_tent_automations: !include packages/grow_tent/grow_tent_automations.yaml
    grow_tent_scripts: !include packages/grow_tent/grow_tent_scripts.yaml
    grow_tent_energy: !include packages/grow_tent/grow_tent_energy.yaml
    grow_tent_notifications: !include packages/grow_tent/grow_tent_notifications.yaml

# =============================================================================
# AUTOMATIONS (subdirectory per system, merged into one list)
# =============================================================================
automation: !include_dir_merge_list automations/

# =============================================================================
# TEMPLATES (subdirectory per system)
# =============================================================================
template: !include_dir_merge_list templates/

# =============================================================================
# SCRIPTS
# =============================================================================
script: !include_dir_merge_named scripts/

# =============================================================================
# SCENES
# =============================================================================
scene: !include_dir_merge_list scenes/

# =============================================================================
# SHELL COMMANDS
# =============================================================================
shell_command:
  get_elevation: "python3 /config/python_scripts/get_elevation.py"
  compute_elevation: "python3 /config/python_scripts/compute_elevation.py"
  ev_text_set: "python3 /config/python_scripts/ev_text_store.py {{ key }} {{ value }}"
  log_decision: "python3 /config/scripts/log_to_db.py decision '{{ system }}' '{{ automation_id }}' '{{ decision_code }}' '{{ decision_text }}' '{{ context }}'"
  log_action: "python3 /config/scripts/log_to_db.py action '{{ system }}' '{{ action_type }}' '{{ target_entity }}' '{{ parameters }}'"
  log_feedback: "python3 /config/scripts/log_to_db.py feedback '{{ system }}' '{{ metric }}' '{{ predicted }}' '{{ actual }}' '{{ context }}'"
  log_cost: "python3 /config/scripts/log_to_db.py cost '{{ system }}' '{{ kwh_solar }}' '{{ kwh_grid_low }}' '{{ kwh_grid_high }}'"
  # --- Solar Forecast Engine (Phase 2A-2C) ---
  solar_forecast: "python3 /config/scripts/solar_forecast.py forecast"
  solar_actual: "python3 /config/scripts/solar_forecast.py actual"
  solar_compare: "python3 /config/scripts/solar_forecast.py compare"
  solar_calibrate: "python3 /config/scripts/solar_forecast.py calibrate"
  solar_banking: "python3 /config/scripts/solar_forecast.py banking"
  # --- Query ---
  query_decisions_today: "python3 /config/scripts/log_to_db.py query_today"
  query_decisions_today_file: "python3 /config/scripts/log_to_db.py query_today_file"
  # --- Deploy from Git ---
  deploy_from_git: "cd /homeassistant/ha-restore && git fetch --all && git reset --hard origin/main && cp -r config/* /config/ && cp -r config/* /homeassistant/ && mkdir -p /config/scripts /homeassistant/scripts && cp scripts/* /config/scripts/ && cp scripts/* /homeassistant/scripts/"
  # --- Deploy via GitHub API (fallback when git binary unavailable) ---
  deploy_from_github: "python3 /config/scripts/deploy_github.py"

# =============================================================================
# REST COMMANDS
# =============================================================================
rest_command:
  google_elevation:
    url: "https://maps.googleapis.com/maps/api/elevation/json?locations={{ locations }}&key={{ key }}"
    method: GET

# =============================================================================
# COMMAND LINE SENSORS
# =============================================================================
command_line:
  - sensor:
      name: "EV Text Store"
      unique_id: ev_text_store
      command: "cat /config/python_scripts/ev_text_store.json"
      value_template: "ok"
      json_attributes:
        - fraser_stops
        - fraser_legs
        - heather_stops
        - heather_legs
        - last_planner_decision
        - trip_digest_signature
        - elevation_summary
      scan_interval: 300
