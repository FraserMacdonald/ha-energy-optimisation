###############################################################################
# ENERGY SOLAR FORECAST – TEMPLATE SENSORS
# File: templates/energy/energy_solar_forecast_sensors.yaml
#
# Phase 2A-2C: Template sensors derived from solar forecast helpers.
#
# Format: YAML list for template: !include_dir_merge_list templates/
#
# Sensors:
#   1. energy_solar_forecast_summary  – Human-readable forecast summary
#   2. energy_solar_forecast_quality  – Quality assessment with attributes
###############################################################################


# =============================================================================
# 1. SOLAR FORECAST SUMMARY
# Combines forecast and actual data into a dashboard-friendly summary.
# Updates whenever the forecast helpers change.
# =============================================================================
- sensor:
    - name: "Energy Solar Forecast Summary"
      unique_id: energy_solar_forecast_summary
      icon: mdi:solar-power-variant
      state: >
        {% set fc = states('input_number.energy_solar_forecast_today_kwh') | float(0) %}
        {% set actual = states('input_number.energy_solar_actual_today_kwh') | float(0) %}
        {% set hour = now().hour %}
        {% if hour < 6 or fc == 0 %}
          Tomorrow: {{ states('input_number.energy_solar_forecast_tomorrow_kwh') | float(0) | round(1) }}kWh
        {% elif actual > 0 %}
          {{ actual | round(1) }} / {{ fc | round(1) }}kWh
        {% else %}
          Forecast: {{ fc | round(1) }}kWh
        {% endif %}
      attributes:
        forecast_today_kwh: >
          {{ states('input_number.energy_solar_forecast_today_kwh') | float(0) | round(1) }}
        forecast_tomorrow_kwh: >
          {{ states('input_number.energy_solar_forecast_tomorrow_kwh') | float(0) | round(1) }}
        actual_today_kwh: >
          {{ states('input_number.energy_solar_actual_today_kwh') | float(0) | round(1) }}
        current_hour_w: >
          {{ states('input_number.energy_solar_forecast_current_hour_w') | float(0) | round(0) }}
        next_hour_w: >
          {{ states('input_number.energy_solar_forecast_next_hour_w') | float(0) | round(0) }}
        peak_hour_w: >
          {{ states('input_number.energy_solar_forecast_peak_hour_w') | float(0) | round(0) }}
        peak_hour: >
          {{ states('input_number.energy_solar_forecast_peak_hour') | int(0) }}
        clear_sky_today_kwh: >
          {{ states('input_number.energy_solar_forecast_clear_sky_today_kwh') | float(0) | round(1) }}
        cloud_pct: >
          {{ states('input_number.energy_solar_forecast_cloud_pct') | float(0) | round(0) }}
        tracking_pct: >
          {% set fc = states('input_number.energy_solar_forecast_today_kwh') | float(0) %}
          {% if fc > 0 %}
            {{ (states('input_number.energy_solar_actual_today_kwh') | float(0) / fc * 100) | round(0) }}
          {% else %}
            0
          {% endif %}
        last_run: >
          {{ states('input_select.energy_solar_forecast_last_run') }}


# =============================================================================
# 2. SOLAR FORECAST QUALITY
# Summarises forecast accuracy for dashboard display.
# =============================================================================
- sensor:
    - name: "Energy Solar Forecast Quality"
      unique_id: energy_solar_forecast_quality
      icon: mdi:gauge
      state: >
        {{ states('input_select.energy_solar_forecast_quality_rating') }}
      attributes:
        quality_score: >
          {{ states('input_number.energy_solar_forecast_quality_score') | float(0) | round(0) }}
        error_nowcast_pct: >
          {{ states('input_number.energy_solar_forecast_error_pct_t0') | float(0) | round(1) }}
        error_24h_pct: >
          {{ states('input_number.energy_solar_forecast_error_pct_t24') | float(0) | round(1) }}
        calibration_factor: >
          {{ states('input_number.energy_solar_calibration_factor') | float(0.75) | round(4) }}
        description: >
          {% set rating = states('input_select.energy_solar_forecast_quality_rating') %}
          {% if rating == 'Excellent' %}Model tracking well, errors < 10%
          {% elif rating == 'Good' %}Reasonable accuracy, errors < 20%
          {% elif rating == 'Fair' %}Moderate accuracy, errors 20-30%
          {% elif rating == 'Poor' %}Low accuracy, errors > 30%
          {% else %}Insufficient data{% endif %}
