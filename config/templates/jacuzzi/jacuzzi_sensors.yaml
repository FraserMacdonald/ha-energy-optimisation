###############################################################################
# JACUZZI TEMPLATE SENSORS
# File: templates/jacuzzi/jacuzzi_sensors.yaml
#
# Format: YAML list for template: !include_dir_merge_list templates/
# Phase 1A: MeteoSwiss bug fixed (la_dole_temperature)
###############################################################################

# =============================================================================
# NON-TRIGGER SENSORS (polled)
# =============================================================================
- sensor:
    # Current Electricity Tariff
    - name: "Electricity Tariff"
      unique_id: electricity_tariff
      state: >
        {% set now_time = now() %}
        {% set hour = now_time.hour %}
        {% set day = now_time.weekday() %}

        {# Monday=0, Thursday=3, Friday=4, Sunday=6 #}
        {% if (day >= 0 and day <= 3 and hour >= 22) or (day >= 0 and day <= 3 and hour < 6) %}
          low
        {% elif day == 4 and hour >= 22 %}
          low
        {% elif (day == 5 or day == 6) %}
          low
        {% elif day == 0 and hour < 6 %}
          low
        {% else %}
          main
        {% endif %}
      attributes:
        rate_chf_kwh: >
          {% if is_state('sensor.electricity_tariff', 'low') %}
            0.25
          {% else %}
            0.35
          {% endif %}
        opportunity_cost: 0.10

    # Next Low Tariff Period Start
    - name: "Next Low Tariff Start"
      unique_id: next_low_tariff_start
      state: >
        {% set now_time = now() %}
        {% set hour = now_time.hour %}
        {% set day = now_time.weekday() %}

        {# If currently in low tariff, find next one #}
        {% if is_state('sensor.electricity_tariff', 'low') %}
          {% if day >= 0 and day <= 3 and hour < 6 %}
            {{ now_time.replace(hour=22, minute=0, second=0) }}
          {% elif day == 4 %}
            {{ now_time.replace(hour=22, minute=0, second=0) }}
          {% elif day == 5 or day == 6 %}
            {{ (now_time + timedelta(days=1)).replace(hour=0, minute=0, second=0) }}
          {% else %}
            {{ (now_time + timedelta(days=(7-day))).replace(hour=22, minute=0, second=0) }}
          {% endif %}
        {% else %}
          {# Currently in main tariff #}
          {% if day >= 0 and day <= 3 %}
            {{ now_time.replace(hour=22, minute=0, second=0) }}
          {% elif day == 4 %}
            {{ now_time.replace(hour=22, minute=0, second=0) }}
          {% else %}
            {{ (now_time + timedelta(days=(7-day))).replace(hour=22, minute=0, second=0) }}
          {% endif %}
        {% endif %}
      device_class: timestamp

    # Next Jacuzzi Event from Calendar
    - name: "Next Jacuzzi Event"
      unique_id: next_jacuzzi_event
      state: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {{ as_timestamp(cal.attributes.start_time) | timestamp_custom('%Y-%m-%d %H:%M') }}
        {% else %}
          unavailable
        {% endif %}
      attributes:
        start_time: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.start_time is defined %}
            {{ cal.attributes.start_time }}
          {% else %}
            null
          {% endif %}
        end_time: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.end_time is defined %}
            {{ cal.attributes.end_time }}
          {% else %}
            null
          {% endif %}
        summary: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.message is defined %}
            {{ cal.attributes.message }}
          {% else %}
            ''
          {% endif %}

    # =========================================================================
    # THERMAL MODEL SENSORS (Physics-Based)
    # =========================================================================

    # Thermal Capacity: C_water = volume * 4.186 / 3600 (kWh/°C)
    - name: "Jacuzzi Thermal Capacity"
      unique_id: jacuzzi_thermal_capacity
      unit_of_measurement: "kWh/°C"
      icon: mdi:water-thermometer
      state: >
        {% set vol = states('input_number.jacuzzi_volume_litres') | float(3200) %}
        {{ (vol * 4.186 / 3600) | round(3) }}

    # Current k: select band based on outdoor temperature
    - name: "Jacuzzi Current K"
      unique_id: jacuzzi_current_k
      unit_of_measurement: "kW/°C"
      icon: mdi:thermometer-minus
      state: >
        {% set ambient = states('sensor.la_dole_temperature') | float(10) %}
        {% if ambient < 5 %}
          {{ states('input_number.jacuzzi_k_cold') | float(0.040) }}
        {% elif ambient <= 15 %}
          {{ states('input_number.jacuzzi_k_mild') | float(0.035) }}
        {% else %}
          {{ states('input_number.jacuzzi_k_warm') | float(0.025) }}
        {% endif %}
      attributes:
        band: >
          {% set ambient = states('sensor.la_dole_temperature') | float(10) %}
          {% if ambient < 5 %}cold
          {% elif ambient <= 15 %}mild
          {% else %}warm{% endif %}
        ambient_temp: "{{ states('sensor.la_dole_temperature') | float(0) }}"

    # Current heat loss in kW
    - name: "Jacuzzi Current Heat Loss kW"
      unique_id: jacuzzi_current_heat_loss_kw
      unit_of_measurement: "kW"
      icon: mdi:thermometer-chevron-down
      state: >
        {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
        {% set t_water = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
        {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
        {{ (k * (t_water - t_ambient)) | round(3) }}

    # Net heating rate in °C/h (positive when heating, negative when cooling)
    - name: "Jacuzzi Net Heating Rate"
      unique_id: jacuzzi_net_heating_rate
      unit_of_measurement: "°C/h"
      icon: mdi:trending-up
      state: >
        {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
        {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
        {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
        {% set t_water = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
        {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
        {% set loss = k * (t_water - t_ambient) %}
        {% set hvac = state_attr('climate.jacuzzi', 'hvac_action') | default('idle') %}
        {% if hvac == 'heating' %}
          {{ ((p_net - loss) / c) | round(2) }}
        {% else %}
          {{ ((-loss) / c) | round(2) }}
        {% endif %}
      attributes:
        heater_state: "{{ state_attr('climate.jacuzzi', 'hvac_action') | default('idle') }}"
        heat_loss_kw: "{{ states('sensor.jacuzzi_current_heat_loss_kw') | float(0) }}"
        p_net_kw: "{{ states('input_number.jacuzzi_effective_power_kw') | float(3.7) }}"

    # Estimated Heat-Up Time (physics integral formula)
    # time = -(C/k) * ln[(P/k - (T_target - T_amb)) / (P/k - (T_current - T_amb))]
    - name: "Jacuzzi Heat Up Time Required"
      unique_id: jacuzzi_heat_up_time
      unit_of_measurement: "h"
      icon: mdi:clock-outline
      state: >
        {% set t_current = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
        {% set t_target = 40 %}
        {% if t_current >= t_target %}
          0
        {% else %}
          {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
          {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
          {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
          {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
          {% set equilibrium = p_net / k %}
          {% set num = equilibrium - (t_target - t_ambient) %}
          {% set den = equilibrium - (t_current - t_ambient) %}
          {% if num <= 0 %}
            99.9
          {% elif den <= 0 %}
            99.9
          {% else %}
            {% set ratio = num / den %}
            {% if ratio <= 0 %}
              99.9
            {% else %}
              {{ (-(c / k) * (ratio | log)) | round(1) }}
            {% endif %}
          {% endif %}
        {% endif %}
      attributes:
        current_temp: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(0) }}"
        target_temp: "40"
        outdoor_temp: "{{ states('sensor.la_dole_temperature') | float(0) }}"
        k_used: "{{ states('sensor.jacuzzi_current_k') | float(0) }}"
        p_net_used: "{{ states('input_number.jacuzzi_effective_power_kw') | float(0) }}"
        heating_rate_at_current: "{{ states('sensor.jacuzzi_net_heating_rate') | float(0) }}"
        heating_rate_at_target: >
          {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
          {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
          {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
          {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
          {{ ((p_net - k * (40 - t_ambient)) / c) | round(2) }}
        is_achievable: >
          {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
          {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
          {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
          {{ (p_net / k) > (40 - t_ambient) }}
        calculation_breakdown: >
          {% set t_current = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
          {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
          {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
          {% set p = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
          {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
          {% set rate = ((p - k * (t_current - t_ambient)) / c) | round(2) %}
          {{ t_current | round(1) }}°C → 40°C. P_net={{ p }}kW, k={{ k }}kW/°C, C={{ c | round(2) }}kWh/°C. Rate@current={{ rate }}°C/h. T_max={{ (t_ambient + p / k) | round(1) }}°C

    # Smart Start Time Calculator (uses physics-based heat_up_time)
    - name: "Jacuzzi Smart Start Time"
      unique_id: jacuzzi_smart_start_time
      state: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_start = as_timestamp(cal.attributes.start_time) %}
          {% set heat_hours = states('sensor.jacuzzi_heat_up_time_required') | float(3) %}
          {% set buffer_min = states('input_number.jacuzzi_preheat_buffer') | float(30) %}
          {% set total_seconds = (heat_hours * 3600) + (buffer_min * 60) %}
          {% set start_time = event_start - total_seconds %}
          {% set solar_priority = is_state('input_boolean.jacuzzi_solar_priority', 'on') %}
          {% set now_ts = now().timestamp() %}
          {% if solar_priority and (event_start - now_ts) > 28800 %}
            {% set start_hour = start_time | timestamp_custom('%H') | int %}
            {% if start_hour < 9 %}
              {% set proposed_start = start_time | timestamp_custom('%Y-%m-%d') + ' 09:00:00' %}
              {% set proposed_ts = as_timestamp(proposed_start) %}
              {% if proposed_ts + total_seconds <= event_start %}
                {{ proposed_ts | timestamp_custom('%Y-%m-%d %H:%M') }}
              {% else %}
                {{ start_time | timestamp_custom('%Y-%m-%d %H:%M') }}
              {% endif %}
            {% else %}
              {{ start_time | timestamp_custom('%Y-%m-%d %H:%M') }}
            {% endif %}
          {% else %}
            {{ start_time | timestamp_custom('%Y-%m-%d %H:%M') }}
          {% endif %}
        {% else %}
          unavailable
        {% endif %}
      attributes:
        calculation_method: >
          {% if is_state('input_boolean.jacuzzi_solar_priority', 'on') %}
            solar_optimized
          {% else %}
            standard
          {% endif %}
        heating_duration_hours: "{{ states('sensor.jacuzzi_heat_up_time_required') | float(0) }}"
        event_time: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.start_time is defined %}
            {{ cal.attributes.start_time }}
          {% else %}
            unavailable
          {% endif %}
        is_achievable: "{{ state_attr('sensor.jacuzzi_heat_up_time_required', 'is_achievable') }}"

    # Maximum achievable temperature: T_max = T_ambient + P_net / k
    - name: "Jacuzzi Max Achievable Temp"
      unique_id: jacuzzi_max_achievable_temp
      unit_of_measurement: "°C"
      icon: mdi:thermometer-chevron-up
      state: >
        {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
        {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
        {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
        {{ (t_ambient + p_net / k) | round(1) }}

    # Standby loss rate in °C/h
    - name: "Jacuzzi Standby Loss Rate"
      unique_id: jacuzzi_standby_loss_rate
      unit_of_measurement: "°C/h"
      icon: mdi:trending-down
      state: >
        {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
        {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
        {% set t_water = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
        {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
        {{ (k * (t_water - t_ambient) / c) | round(2) }}

    # Predicted temp at event time
    - name: "Jacuzzi Predicted Temp at Event"
      unique_id: jacuzzi_predicted_temp_at_event
      unit_of_measurement: "°C"
      icon: mdi:thermometer-probe
      state: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_ts = as_timestamp(cal.attributes.start_time) %}
          {% set now_ts = as_timestamp(now()) %}
          {% set hours_to_event = (event_ts - now_ts) / 3600 %}
          {% if hours_to_event <= 0 or hours_to_event > 24 %}
            unavailable
          {% else %}
            {% set t_current = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
            {% set t_ambient = states('sensor.la_dole_temperature') | float(10) %}
            {% set k = states('sensor.jacuzzi_current_k') | float(0.035) %}
            {% set p_net = states('input_number.jacuzzi_effective_power_kw') | float(3.7) %}
            {% set c = states('sensor.jacuzzi_thermal_capacity') | float(3.72) %}
            {% set smart_start = states('sensor.jacuzzi_smart_start_time') %}
            {% set is_heating = states('input_number.jacuzzi_target_temp') | float(15) >= 40 %}
            {% set equilibrium = t_ambient + p_net / k %}
            {% if is_heating %}
              {# Currently heating — project to event using exponential approach #}
              {% set predicted = equilibrium - (equilibrium - t_current) * ((-k / c) * hours_to_event) | exp %}
              {{ [predicted, 40] | min | round(1) }}
            {% elif smart_start not in ['unavailable', 'unknown', ''] %}
              {# Not yet heating — cool until smart_start, then heat until event #}
              {% set smart_ts = as_timestamp(smart_start) %}
              {% set cool_hours = [(smart_ts - now_ts) / 3600, 0] | max %}
              {% set heat_hours = [hours_to_event - cool_hours, 0] | max %}
              {# Cooling phase: T decays toward ambient #}
              {% set t_after_cool = t_ambient + (t_current - t_ambient) * ((-k / c) * cool_hours) | exp %}
              {# Heating phase: T approaches equilibrium #}
              {% set predicted = equilibrium - (equilibrium - t_after_cool) * ((-k / c) * heat_hours) | exp %}
              {{ [predicted, 40] | min | round(1) }}
            {% else %}
              {# No smart start — assume cooling only #}
              {% set predicted = t_ambient + (t_current - t_ambient) * ((-k / c) * hours_to_event) | exp %}
              {{ predicted | round(1) }}
            {% endif %}
          {% endif %}
        {% else %}
          unavailable
        {% endif %}
      attributes:
        event_time: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.start_time is defined %}
            {{ cal.attributes.start_time }}
          {% else %}
            unavailable
          {% endif %}
        will_be_ready: >
          {% set pred = states('sensor.jacuzzi_predicted_temp_at_event') %}
          {{ pred not in ['unavailable', 'unknown'] and pred | float(0) >= 38 }}
        predicted_temp: "{{ states('sensor.jacuzzi_predicted_temp_at_event') }}"

    # Thermal model status
    - name: "Jacuzzi Thermal Model Status"
      unique_id: jacuzzi_thermal_model_status
      icon: mdi:chart-line
      state: >
        {% set heat_obs = states('input_number.jacuzzi_model_heating_observations') | int(0) %}
        {% set cool_obs = states('input_number.jacuzzi_model_cooling_observations') | int(0) %}
        {% if heat_obs < 5 and cool_obs < 5 %}
          bootstrapping
        {% elif heat_obs < 20 or cool_obs < 20 %}
          learning
        {% else %}
          calibrated
        {% endif %}
      attributes:
        heating_observations: "{{ states('input_number.jacuzzi_model_heating_observations') | int(0) }}"
        cooling_observations: "{{ states('input_number.jacuzzi_model_cooling_observations') | int(0) }}"
        total_observations: "{{ states('input_number.jacuzzi_model_observation_count') | int(0) }}"
        current_k: "{{ states('sensor.jacuzzi_current_k') | float(0) }}"
        current_p_net: "{{ states('input_number.jacuzzi_effective_power_kw') | float(0) }}"
        last_update: "{{ states('input_datetime.jacuzzi_last_sample_time') }}"

    # Cost Savings Tracker (Daily)
    - name: "Jacuzzi Daily Savings"
      unique_id: jacuzzi_daily_savings
      state: >
        {# Calculate savings vs 24/7 at 40C #}
        {# Estimate: 3.5kW * 40% duty cycle at steady state = 1.4kW avg * 24h = 33.6 kWh/day #}
        {# At 0.35 CHF/kWh average = 11.76 CHF/day baseline cost #}

        {# This is a simplified estimate - enhance with actual power monitoring #}
        {% set baseline_daily_cost = 11.76 %}
        {% set actual_cost = states('sensor.jacuzzi_daily_cost') | float(0) %}
        {{ (baseline_daily_cost - actual_cost) | round(2) }}
      unit_of_measurement: "CHF"
      icon: mdi:piggy-bank

    # Current Mode
    - name: "Jacuzzi Current Mode"
      unique_id: jacuzzi_current_mode
      state: >
        {% if is_state('input_boolean.jacuzzi_maintenance_mode', 'on') %}
          maintenance
        {% elif is_state('input_boolean.jacuzzi_manual_override', 'on') %}
          manual_override
        {% elif not is_state('input_boolean.jacuzzi_automation_enabled', 'on') %}
          disabled
        {% else %}
          {% set current_temp = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
          {% set target_temp = state_attr('climate.jacuzzi', 'temperature') | float(40) %}
          {% set hvac_mode = states('climate.jacuzzi') %}
          {% if current_temp >= (target_temp - 0.5) %}
            ready
          {% elif hvac_mode == 'heat' %}
            heating
          {% else %}
            standby
          {% endif %}
        {% endif %}
      icon: >
        {% if is_state('sensor.jacuzzi_current_mode', 'ready') %}
          mdi:hot-tub
        {% elif is_state('sensor.jacuzzi_current_mode', 'heating') %}
          mdi:fire
        {% elif is_state('sensor.jacuzzi_current_mode', 'maintenance') %}
          mdi:wrench
        {% else %}
          mdi:power-sleep
        {% endif %}
      attributes:
        current_temperature: "{{ state_attr('climate.jacuzzi', 'current_temperature') }}"
        target_temperature: "{{ state_attr('climate.jacuzzi', 'temperature') }}"
        hvac_mode: "{{ states('climate.jacuzzi') }}"
