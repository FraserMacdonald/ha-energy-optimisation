###############################################################################
# JACUZZI BINARY SENSOR TEMPLATES
# File: templates/jacuzzi/jacuzzi_binary_sensors.yaml
#
# Format: YAML list for template: !include_dir_merge_list templates/
# Phase 1A: unique_id renamed to jacuzzi_solar_available
###############################################################################

- binary_sensor:
    # Solar Production Available
    - name: "Solar Available for Jacuzzi"
      unique_id: jacuzzi_solar_available
      state: >
        {% set solar_power = states('sensor.solaredge_current_power') | float(0) %}
        {% set solar_power = solar_power * 1000 if state_attr('sensor.solaredge_current_power', 'unit_of_measurement') == 'kW' else solar_power %}
        {% set consumption = states('sensor.solaredge_power_consumption') | float(0) %}
        {% set consumption = consumption * 1000 if state_attr('sensor.solaredge_power_consumption', 'unit_of_measurement') == 'kW' else consumption %}
        {% set jacuzzi_power = 6000 %}
        {% set excess = solar_power - consumption %}
        {{ excess >= jacuzzi_power }}
      attributes:
        solar_power_w: >
          {% set v = states('sensor.solaredge_current_power') | float(0) %}
          {{ (v * 1000 if state_attr('sensor.solaredge_current_power', 'unit_of_measurement') == 'kW' else v) | round(0) }}
        current_consumption_w: >
          {% set v = states('sensor.solaredge_power_consumption') | float(0) %}
          {{ (v * 1000 if state_attr('sensor.solaredge_power_consumption', 'unit_of_measurement') == 'kW' else v) | round(0) }}
        jacuzzi_requirement_w: 6000
        excess_available_w: >
          {% set p = states('sensor.solaredge_current_power') | float(0) %}
          {% set p = p * 1000 if state_attr('sensor.solaredge_current_power', 'unit_of_measurement') == 'kW' else p %}
          {% set c = states('sensor.solaredge_power_consumption') | float(0) %}
          {% set c = c * 1000 if state_attr('sensor.solaredge_power_consumption', 'unit_of_measurement') == 'kW' else c %}
          {{ (p - c) | round(0) }}
        grid_power_w: >
          {% set v = states('sensor.solaredge_grid_power') | float(0) %}
          {{ (v * 1000 if state_attr('sensor.solaredge_grid_power', 'unit_of_measurement') == 'kW' else v) | round(0) }}
