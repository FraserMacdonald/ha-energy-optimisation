###############################################################################
# JACUZZI AUTOMATIONS
# File: automations/jacuzzi/jacuzzi_automations.yaml
#
# Numbering scheme (3-digit, per-system):
#   001-019: Core / lifecycle
#   020-039: Solar / energy
#   040-059: Scheduling / calendar
#   060-079: Notifications / alerts
#   080-099: Safety / override
#
# Phase 1A: Renumbered, bug-fixed, syntax modernised
###############################################################################


# ==============================================================================
# 001 – TEMPERATURE CONTROL LOOP
# ==============================================================================
- id: auto_jacuzzi_001_temperature_control
  alias: "Jacuzzi 001 – Temperature Control Loop"
  description: >
    Controls heater based on target temperature with 0.5°C hysteresis.
    Runs every 2 minutes and on temperature/target changes.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: climate.jacuzzi
      attribute: current_temperature
    - trigger: state
      entity_id: input_number.jacuzzi_target_temp
    - trigger: time_pattern
      minutes: "/2"

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_manual_override
      state: "off"
    - condition: state
      entity_id: input_boolean.jacuzzi_maintenance_mode
      state: "off"

  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {% set current = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
                {% set target = states('input_number.jacuzzi_target_temp') | float(40) %}
                {{ current < (target - 0.5) }}
          sequence:
            - action: climate.set_temperature
              target:
                entity_id: climate.jacuzzi
              data:
                temperature: "{{ states('input_number.jacuzzi_target_temp') }}"
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.jacuzzi
              data:
                hvac_mode: heat

        - conditions:
            - condition: template
              value_template: >
                {% set current = state_attr('climate.jacuzzi', 'current_temperature') | float(20) %}
                {% set target = states('input_number.jacuzzi_target_temp') | float(40) %}
                {{ current >= target }}
          sequence:
            - action: climate.set_hvac_mode
              target:
                entity_id: climate.jacuzzi
              data:
                hvac_mode: "off"


# ==============================================================================
# 020 – SOLAR OPPORTUNISTIC HEATING
# Note: Will be retired in Phase 1C when orchestrator handles solar dispatch.
# ==============================================================================
- id: auto_jacuzzi_020_solar_opportunistic
  alias: "Jacuzzi 020 – Solar Opportunistic Heating"
  description: >
    Uses excess solar to pre-heat jacuzzi when event is scheduled within 24h.
    RETIRE in Phase 1C – orchestrator will handle solar dispatch.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    # Bug fix: was binary_sensor.solar_available_jacuzzi (wrong entity_id)
    # Name "Solar Available for Jacuzzi" → entity binary_sensor.solar_available_for_jacuzzi
    - trigger: state
      entity_id: binary_sensor.solar_available_for_jacuzzi
      to: "on"
      for:
        minutes: 5

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_solar_priority
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_manual_override
      state: "off"
    # Orchestrator gate: legacy mode (off) OR orchestrator grants permission
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.energy_orchestrator_enabled
          state: "off"
        - condition: state
          entity_id: input_boolean.energy_jacuzzi_heat_allowed
          state: "on"
    - condition: template
      value_template: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_start = as_timestamp(cal.attributes.start_time) %}
          {% set now_ts = now().timestamp() %}
          {{ (event_start - now_ts) < 86400 and (event_start - now_ts) > 0 }}
        {% else %}
          false
        {% endif %}
    - condition: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) < 38 }}

  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: 40
    - action: logbook.log
      data:
        name: "Jacuzzi Solar Heating"
        message: >
          Using excess solar to pre-heat jacuzzi.
          Solar: {{ state_attr('binary_sensor.solar_available_for_jacuzzi', 'solar_power_w') }}W


# ==============================================================================
# 021 – LOW TARIFF HEATING PREFERENCE
# Note: Will be retired in Phase 1C when orchestrator handles tariff logic.
# ==============================================================================
- id: auto_jacuzzi_021_low_tariff_heating
  alias: "Jacuzzi 021 – Low Tariff Heating Preference"
  description: >
    Delays heating to low tariff period if enough time available.
    RETIRE in Phase 1C – orchestrator will handle tariff decisions.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: sensor.electricity_tariff
      to: "low"

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_manual_override
      state: "off"
    # Orchestrator gate: legacy mode (off) OR orchestrator grants permission
    - condition: or
      conditions:
        - condition: state
          entity_id: input_boolean.energy_orchestrator_enabled
          state: "off"
        - condition: state
          entity_id: input_boolean.energy_jacuzzi_heat_allowed
          state: "on"
    - condition: template
      value_template: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_start = as_timestamp(cal.attributes.start_time) %}
          {% set now_ts = now().timestamp() %}
          {% set heat_time = states('sensor.jacuzzi_heat_up_time_required') | float(3) * 3600 %}
          {% set time_available = event_start - now_ts %}
          {{ time_available > heat_time and time_available < 43200 }}
        {% else %}
          false
        {% endif %}
    - condition: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) < 35 }}

  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: 40
    - action: logbook.log
      data:
        name: "Jacuzzi Low Tariff Heating"
        message: >
          Starting heating during low tariff for event
          at {{ state_attr('calendar.jacuzzi_schedule', 'start_time') }}


# ==============================================================================
# 022 – SOLAR OFF FALLBACK
# Reverts to standby when solar surplus drops while jacuzzi was solar-heating.
# ==============================================================================
- id: auto_jacuzzi_022_solar_off_fallback
  alias: "Jacuzzi 022 – Solar Off Fallback"
  description: >
    If jacuzzi is heating due to solar opportunistic mode and solar surplus
    drops below 3500W for more than 10 minutes, reverts target to standby.
    Prevents grid heating when clouds appear.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: numeric_state
      entity_id: sensor.energy_solar_surplus_w
      below: 3500
      for:
        minutes: 10

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_solar_priority
      state: "on"
    # Only if currently heating (target at 40)
    - condition: template
      value_template: >
        {{ states('input_number.jacuzzi_target_temp') | float(15) >= 40 }}
    # Don't revert if in a calendar-driven preheat window
    - condition: template
      value_template: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% set smart_start = states('sensor.jacuzzi_smart_start_time') %}
        {% set in_preheat_or_event = false %}
        {% if cal is not none and cal.attributes.start_time is defined
           and smart_start not in ['unavailable', 'unknown', ''] %}
          {% set now_ts = as_timestamp(now()) %}
          {% set event_ts = as_timestamp(cal.attributes.start_time) %}
          {% set smart_ts = as_timestamp(smart_start) %}
          {% set in_preheat_or_event = (now_ts >= smart_ts and now_ts < event_ts)
                                       or is_state('calendar.jacuzzi_schedule', 'on') %}
        {% endif %}
        {{ not in_preheat_or_event }}

  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: "{{ states('input_number.jacuzzi_standby_temp') | float(15) }}"
    - action: logbook.log
      data:
        name: "Jacuzzi Solar Fallback"
        message: >
          Solar surplus dropped below 3500W for 10 min. Reverting to standby
          ({{ states('input_number.jacuzzi_standby_temp') }}°C) to prevent grid heating.


# ==============================================================================
# 040 – CALENDAR EVENT SCHEDULER
# ==============================================================================
- id: auto_jacuzzi_040_calendar_scheduler
  alias: "Jacuzzi 040 – Calendar Event Scheduler"
  description: >
    Monitors calendar and schedules heating to start at the optimal time
    calculated by sensor.jacuzzi_smart_start_time.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/5"
    - trigger: state
      entity_id: calendar.jacuzzi_schedule

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: state
      entity_id: input_boolean.jacuzzi_manual_override
      state: "off"

  actions:
    - choose:
        # Preheat window: start time reached but event hasn't started
        - conditions:
            - condition: template
              value_template: >
                {% set cal = states.calendar.jacuzzi_schedule %}
                {% if cal is not none and cal.attributes.start_time is defined %}
                  {% set event_start = as_timestamp(cal.attributes.start_time) %}
                  {% set smart_start_raw = states('sensor.jacuzzi_smart_start_time') %}
                  {% if smart_start_raw not in ['unavailable', 'unknown', ''] %}
                    {% set smart_start = as_timestamp(smart_start_raw) %}
                    {% set now_ts = now().timestamp() %}
                    {{ now_ts >= smart_start and now_ts < event_start }}
                  {% else %}
                    false
                  {% endif %}
                {% else %}
                  false
                {% endif %}
            # Orchestrator gate: legacy mode (off) OR orchestrator grants permission
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.energy_orchestrator_enabled
                  state: "off"
                - condition: state
                  entity_id: input_boolean.energy_jacuzzi_heat_allowed
                  state: "on"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.jacuzzi_target_temp
              data:
                value: 40

        # Event ongoing — maintain temperature
        - conditions:
            - condition: state
              entity_id: calendar.jacuzzi_schedule
              state: "on"
            # Orchestrator gate: legacy mode (off) OR orchestrator grants permission
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.energy_orchestrator_enabled
                  state: "off"
                - condition: state
                  entity_id: input_boolean.energy_jacuzzi_heat_allowed
                  state: "on"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.jacuzzi_target_temp
              data:
                value: 40

      # Default: no event or event passed — standby
      default:
        - action: input_number.set_value
          target:
            entity_id: input_number.jacuzzi_target_temp
          data:
            value: "{{ states('input_number.jacuzzi_standby_temp') }}"


# ==============================================================================
# 060 – EVENT READINESS REMINDER
# ==============================================================================
- id: auto_jacuzzi_060_event_reminder
  alias: "Jacuzzi 060 – Event Readiness Reminder"
  description: >
    Notifies 30 minutes before a jacuzzi event if the water is ready.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_start = as_timestamp(cal.attributes.start_time) %}
          {% set now_ts = now().timestamp() %}
          {% set diff = event_start - now_ts %}
          {{ diff <= 1800 and diff > 1740 }}
        {% else %}
          false
        {% endif %}

  conditions:
    - condition: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) >= 38 }}

  actions:
    - variables:
        current_temp: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(0) | round(1) }}"
        event_time: "{{ state_attr('calendar.jacuzzi_schedule', 'start_time') }}"
        start_temp: "{{ states('input_number.energy_jacuzzi_heating_start_temp') | float(0) | round(1) }}"
        heat_hours: >
          {% set last_time = states('input_datetime.energy_jacuzzi_last_progress_time') %}
          {% if last_time not in ['unknown', 'unavailable', ''] %}
            {{ ((as_timestamp(now()) - as_timestamp(last_time)) / 3600) | round(1) }}
          {% else %}
            unknown
          {% endif %}
        surplus: "{{ states('sensor.energy_solar_surplus_w') | float(0) | round(0) }}"
        source: >
          {% if surplus | float > 3500 and is_state('input_boolean.jacuzzi_solar_priority', 'on') %}
            solar
          {% elif is_state('binary_sensor.energy_low_tariff_active', 'on') %}
            low tariff
          {% else %}
            grid
          {% endif %}

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "Jacuzzi Ready"
        message: >
          Jacuzzi at {{ current_temp }}°C and ready for your {{ event_time }} session!
          Heated from {{ start_temp }}°C using {{ source }}.

    - action: notify.mobile_app_heather_s_iphone
      data:
        title: "Jacuzzi Ready"
        message: >
          Jacuzzi at {{ current_temp }}°C and ready for your {{ event_time }} session!
          Heated from {{ start_temp }}°C using {{ source }}.


# ==============================================================================
# 061 – NOT READY WARNING
# Companion to 060 – fires when jacuzzi is NOT ready before an event.
# ==============================================================================
- id: auto_jacuzzi_061_not_ready_warning
  alias: "Jacuzzi 061 – Not Ready Warning"
  description: >
    Notifies 30 minutes before a calendar event if the jacuzzi water
    temperature is below 38°C, with the current temp and estimated
    time to ready.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {% set cal = states.calendar.jacuzzi_schedule %}
        {% if cal is not none and cal.attributes.start_time is defined %}
          {% set event_start = as_timestamp(cal.attributes.start_time) %}
          {% set now_ts = now().timestamp() %}
          {% set diff = event_start - now_ts %}
          {{ diff <= 1800 and diff > 1740 }}
        {% else %}
          false
        {% endif %}

  conditions:
    - condition: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) < 38 }}

  actions:
    - variables:
        current_temp: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(0) | round(1) }}"
        heat_hours: "{{ states('sensor.jacuzzi_heat_up_time_required') | float(3) }}"
        outdoor_temp: "{{ states('sensor.la_dole_temperature') | float(10) }}"
        rate: >
          {% if outdoor_temp | float > 15 %}
            {{ states('input_number.jacuzzi_heat_rate_summer') | float(5) }}
          {% else %}
            {{ states('input_number.jacuzzi_heat_rate_winter') | float(3) }}
          {% endif %}
        eta: >
          {% set hrs = heat_hours | float %}
          {% if hrs > 0 %}
            {{ (as_timestamp(now()) + hrs * 3600) | timestamp_custom('%H:%M') }}
          {% else %}
            now
          {% endif %}
        event_time: "{{ state_attr('calendar.jacuzzi_schedule', 'start_time') }}"
        event_ts: "{{ as_timestamp(state_attr('calendar.jacuzzi_schedule', 'start_time')) }}"
        eta_ts: "{{ as_timestamp(now()) + heat_hours | float * 3600 }}"
        late_mins: "{{ ((eta_ts | float - event_ts | float) / 60) | round(0) }}"

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "Jacuzzi Not Ready"
        message: >
          Jacuzzi at {{ current_temp }}°C. Event in 30 min.
          At current rate ({{ rate }}°C/h), ready at {{ eta }} ({{ late_mins }} min late).
        data:
          push:
            interruption-level: time-sensitive

    - action: notify.mobile_app_heather_s_iphone
      data:
        title: "Jacuzzi Not Ready"
        message: >
          Jacuzzi at {{ current_temp }}°C. Event in 30 min.
          At current rate ({{ rate }}°C/h), ready at {{ eta }} ({{ late_mins }} min late).
        data:
          push:
            interruption-level: time-sensitive


# ==============================================================================
# 080 – MANUAL OVERRIDE HANDLER
# ==============================================================================
- id: auto_jacuzzi_080_manual_override
  alias: "Jacuzzi 080 – Manual Override Handler"
  description: >
    Handles manual override activation and expiration.
    When override expires, returns to automatic control.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: input_boolean.jacuzzi_manual_override
      to: "on"
    - trigger: template
      value_template: >
        {% set override_until = states('input_datetime.jacuzzi_override_until') %}
        {{ is_state('input_boolean.jacuzzi_manual_override', 'on')
           and override_until not in ['unknown', 'unavailable', '']
           and as_timestamp(now()) >= as_timestamp(override_until) }}

  actions:
    - choose:
        # Override activated (and not yet expired)
        - conditions:
            - condition: state
              entity_id: input_boolean.jacuzzi_manual_override
              state: "on"
            - condition: template
              value_template: >
                {% set override_until = states('input_datetime.jacuzzi_override_until') %}
                {{ override_until in ['unknown', 'unavailable', '']
                   or as_timestamp(now()) < as_timestamp(override_until) }}
          sequence:
            - action: logbook.log
              data:
                name: "Jacuzzi Manual Override"
                message: >
                  Manual override activated
                  until {{ states('input_datetime.jacuzzi_override_until') }}

        # Override expired
        - conditions:
            - condition: template
              value_template: >
                {% set override_until = states('input_datetime.jacuzzi_override_until') %}
                {{ override_until not in ['unknown', 'unavailable', '']
                   and as_timestamp(now()) >= as_timestamp(override_until) }}
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.jacuzzi_manual_override
            - action: logbook.log
              data:
                name: "Jacuzzi Manual Override"
                message: "Override expired, returning to automatic control"


# ==============================================================================
# 090 – FREEZE PROTECTION
# ==============================================================================
- id: auto_jacuzzi_090_freeze_protection
  alias: "Jacuzzi 090 – Freeze Protection"
  description: >
    Prevents freezing in extreme cold. Activates heating if water
    temperature drops below 5°C. Overrides all other modes.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) < 5 }}

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"

  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: 10
    - action: notify.notify
      data:
        title: "⚠️ Jacuzzi Freeze Protection"
        message: >
          Temperature critically low
          ({{ state_attr('climate.jacuzzi', 'current_temperature') }}°C).
          Freeze protection activated, heating to 10°C.


# ==============================================================================
# 091 – PIPE FREEZE PUMP CYCLING
# Safety tier 0 — bypasses orchestrator. Runs independently of heating demand.
# ==============================================================================
- id: auto_jacuzzi_091_pipe_freeze_cycling
  alias: "Jacuzzi 091 – Pipe Freeze Pump Cycling"
  description: >
    Cycles the jacuzzi pump for 5 minutes every 30 minutes when outdoor
    temperature is below 0°C and the jacuzzi is in standby. Prevents pipe
    freezing by circulating water. Safety tier 0 — bypasses orchestrator.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    - condition: state
      entity_id: input_boolean.jacuzzi_automation_enabled
      state: "on"
    - condition: numeric_state
      entity_id: sensor.la_dole_temperature
      below: 0
    # Only cycle when in standby (not actively heating for an event)
    - condition: template
      value_template: >
        {{ states('input_number.jacuzzi_target_temp') | float(40)
           <= states('input_number.jacuzzi_standby_temp') | float(15) }}

  actions:
    # Temporarily raise target to trigger pump circulation
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: >
          {{ [state_attr('climate.jacuzzi', 'current_temperature') | float(5) + 2,
              states('input_number.jacuzzi_standby_temp') | float(15)] | max }}
    - delay:
        minutes: 5
    # Restore standby temperature
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_target_temp
      data:
        value: "{{ states('input_number.jacuzzi_standby_temp') | float(15) }}"
    - action: logbook.log
      data:
        name: "Jacuzzi Pipe Protection"
        message: >
          Pump cycled for 5 min (outdoor: {{ states('sensor.la_dole_temperature') }}°C)


# ==============================================================================
# 095 – THERMAL MODEL UPDATE (Adaptive Feedback Loop)
# Samples temperature every 15 min and updates P_net or k via EWM average.
# ==============================================================================
- id: auto_jacuzzi_095_thermal_model_update
  alias: "Jacuzzi 095 – Thermal Model Update"
  description: >
    Samples water temperature every 15 minutes and updates the thermal model
    parameters (P_net or k) using exponentially weighted moving average.
    Only updates when heater state was stable for the entire interval.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/15"

  conditions:
    - condition: template
      value_template: >
        {% set t = state_attr('climate.jacuzzi', 'current_temperature') %}
        {{ t is not none and t not in ['unavailable', 'unknown'] }}

  actions:
    - variables:
        # Current readings
        t_now: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) }}"
        t_ambient_now: "{{ states('sensor.la_dole_temperature') | float(10) }}"
        heater_now: "{{ state_attr('climate.jacuzzi', 'hvac_action') | default('idle') }}"

        # Last sample
        t_last: "{{ states('input_number.jacuzzi_last_sample_temp') | float(20) }}"
        t_ambient_last: "{{ states('input_number.jacuzzi_last_sample_ambient') | float(10) }}"
        time_last: "{{ states('input_datetime.jacuzzi_last_sample_time') }}"
        heater_last: "{{ states('input_select.jacuzzi_last_sample_heater_state') }}"

        # Duration since last sample
        has_last: "{{ time_last not in ['unknown', 'unavailable', ''] }}"
        duration_h: >
          {% if has_last %}
            {{ ((as_timestamp(now()) - as_timestamp(time_last)) / 3600) | round(4) }}
          {% else %}
            0
          {% endif %}

        # Thermal capacity
        vol: "{{ states('input_number.jacuzzi_volume_litres') | float(3200) }}"
        c_water: "{{ (vol * 4.186 / 3600) | round(4) }}"

        # Current k for the ambient band
        k_current: "{{ states('sensor.jacuzzi_current_k') | float(0.035) }}"

        # Validity checks
        duration_valid: "{{ duration_h | float >= 0.1 and duration_h | float <= 2.0 }}"
        state_stable: "{{ heater_now == heater_last }}"
        should_update: "{{ has_last and duration_valid and state_stable }}"

        # Averages
        t_avg_water: "{{ ((t_last | float + t_now | float) / 2) | round(2) }}"
        t_ambient_avg: "{{ ((t_ambient_last | float + t_ambient_now | float) / 2) | round(2) }}"

    # Heating observation
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ should_update and heater_now == 'heating' }}"
          sequence:
            - variables:
                # P_observed = C * dT/dt + k * (T_avg - T_amb_avg)
                p_observed: >
                  {{ (c_water | float * (t_now | float - t_last | float) / duration_h | float
                      + k_current | float * (t_avg_water | float - t_ambient_avg | float)) | round(3) }}
                p_sane: "{{ p_observed | float > 0.5 and p_observed | float < 12 }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ p_sane }}"
                  sequence:
                    - variables:
                        p_old: "{{ states('input_number.jacuzzi_effective_power_kw') | float(3.7) }}"
                        p_new: "{{ (0.1 * p_observed | float + 0.9 * p_old | float) | round(3) }}"
                        heat_count: "{{ states('input_number.jacuzzi_model_heating_observations') | int(0) + 1 }}"
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.jacuzzi_effective_power_kw
                      data:
                        value: "{{ p_new }}"
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.jacuzzi_model_heating_observations
                      data:
                        value: "{{ heat_count }}"
                    - action: logbook.log
                      data:
                        name: "Thermal Model"
                        message: >
                          Heating #{{ heat_count }}. {{ t_last }}→{{ t_now }}°C in {{ duration_h }}h.
                          Ambient {{ t_ambient_avg }}°C. P_obs={{ p_observed }}kW → P_net={{ p_new }}kW

    # Cooling observation
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ should_update and heater_now == 'idle'
                   and (t_avg_water | float - t_ambient_avg | float) >= 3
                   and t_now | float < t_last | float }}
          sequence:
            - variables:
                # k_observed = C * ln((T_start - T_amb) / (T_end - T_amb)) / duration
                t_start_diff: "{{ t_last | float - t_ambient_avg | float }}"
                t_end_diff: "{{ t_now | float - t_ambient_avg | float }}"
                k_observed: >
                  {% if t_end_diff | float > 0 and t_start_diff | float > 0 %}
                    {{ (c_water | float * ((t_start_diff / t_end_diff) | log) / duration_h | float) | round(4) }}
                  {% else %}
                    0
                  {% endif %}
                k_sane: "{{ k_observed | float > 0.005 and k_observed | float < 0.2 }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ k_sane }}"
                  sequence:
                    - variables:
                        # Determine which k to update based on ambient band
                        band: >
                          {% if t_ambient_avg | float < 5 %}cold
                          {% elif t_ambient_avg | float <= 15 %}mild
                          {% else %}warm{% endif %}
                        k_entity: "input_number.jacuzzi_k_{{ band }}"
                        k_old: "{{ states(k_entity) | float(0.035) }}"
                        k_new: "{{ (0.1 * k_observed | float + 0.9 * k_old | float) | round(4) }}"
                        cool_count: "{{ states('input_number.jacuzzi_model_cooling_observations') | int(0) + 1 }}"
                    - action: input_number.set_value
                      target:
                        entity_id: "{{ k_entity }}"
                      data:
                        value: "{{ k_new }}"
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.jacuzzi_model_cooling_observations
                      data:
                        value: "{{ cool_count }}"
                    - action: logbook.log
                      data:
                        name: "Thermal Model"
                        message: >
                          Cooling #{{ cool_count }} ({{ band }}). {{ t_last }}→{{ t_now }}°C in {{ duration_h }}h.
                          Ambient {{ t_ambient_avg }}°C. k_obs={{ k_observed }}kW/°C → k_{{ band }}={{ k_new }}kW/°C

    # Always: update sample state and increment total count
    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_last_sample_temp
      data:
        value: "{{ t_now }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_last_sample_ambient
      data:
        value: "{{ t_ambient_now }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.jacuzzi_last_sample_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_select.select_option
      target:
        entity_id: input_select.jacuzzi_last_sample_heater_state
      data:
        option: "{{ heater_now if heater_now in ['heating', 'idle'] else 'unknown' }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ should_update }}"
          sequence:
            - action: input_number.set_value
              target:
                entity_id: input_number.jacuzzi_model_observation_count
              data:
                value: "{{ states('input_number.jacuzzi_model_observation_count') | int(0) + 1 }}"


# ==============================================================================
# 096 – THERMAL MODEL RESET SAMPLE (Heater State Change)
# Resets the sample window when heater transitions between heating/idle.
# ==============================================================================
- id: auto_jacuzzi_096_thermal_model_reset_sample
  alias: "Jacuzzi 096 – Thermal Model Reset Sample"
  description: >
    Immediately resets the thermal model sample window when the heater
    changes state between heating and idle, since transition data is unreliable.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {{ state_attr('climate.jacuzzi', 'hvac_action') | default('unknown') }}

  actions:
    - variables:
        heater_state: "{{ state_attr('climate.jacuzzi', 'hvac_action') | default('unknown') }}"
        t_now: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(20) }}"
        t_ambient: "{{ states('sensor.la_dole_temperature') | float(10) }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_last_sample_temp
      data:
        value: "{{ t_now }}"

    - action: input_number.set_value
      target:
        entity_id: input_number.jacuzzi_last_sample_ambient
      data:
        value: "{{ t_ambient }}"

    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.jacuzzi_last_sample_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - action: input_select.select_option
      target:
        entity_id: input_select.jacuzzi_last_sample_heater_state
      data:
        option: "{{ heater_state if heater_state in ['heating', 'idle'] else 'unknown' }}"

    - action: logbook.log
      data:
        name: "Thermal Model"
        message: "Heater changed to {{ heater_state }}. Reset sample window."
