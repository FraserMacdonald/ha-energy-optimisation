- id: auto_ev_063_plug_reminder
  alias: "EV 063 – Plug-In Reminder"
  description: "Reminds to plug in the planned car during cheap tariff"
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/15"

    - trigger: state
      entity_id:
        - device_tracker.fraser_s_iphone
        - device_tracker.heather_s_iphone
      to: "home"

  actions:
    - variables:
        plan_car: "{{ states('input_select.ev_night_charge_car') }}"
        plugged: "{{ states('sensor.ev_plugged_vehicle') }}"
        target_soc: "{{ states('input_number.ev_night_charge_target_soc') | float(0) }}"

        horace_home: "{{ is_state('device_tracker.horace_location', 'home') }}"
        horatio_home: "{{ is_state('device_tracker.horatio_location', 'home') }}"
        plan_car_home: "{{ (plan_car == 'Horace' and horace_home) or (plan_car == 'Horatio' and horatio_home) }}"
        wrong_or_none_plugged: "{{ plugged != plan_car }}"

        fraser_home: "{{ states('device_tracker.fraser_s_iphone') in ['home', 'Coming Home'] }}"
        heather_home: "{{ states('device_tracker.heather_s_iphone') in ['home', 'Coming Home'] }}"

        cooldown_min: "{{ states('input_number.ev_plug_request_cooldown_min') | int(60) }}"
        last_req_ts: "{{ as_timestamp(states('input_datetime.ev_last_plug_request')) | float(0) }}"
        now_ts: "{{ as_timestamp(now()) }}"
        cooldown_ok: "{{ (now_ts - last_req_ts) >= (cooldown_min * 60) }}"

        cheap_active: "{{ states('sensor.ev_cheap_tariff_active') == 'on' }}"

        should_notify: >
          {{ plan_car in ['Horace', 'Horatio']
             and plan_car_home
             and wrong_or_none_plugged
             and cooldown_ok
             and cheap_active
             and (fraser_home or heather_home) }}

        msg: "🔌 Cheap tariff active. Please plug in **{{ plan_car }}** (target {{ target_soc | round(0) }}%)"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ should_notify }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ fraser_home }}"
                  sequence:
                    - action: notify.mobile_app_fraser_s_iphone
                      data:
                        message: "{{ msg }}"
              default:
                - action: notify.mobile_app_heather_s_iphone
                  data:
                    message: "{{ msg }}"

            - action: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ev_last_plug_request
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"


- id: auto_ev_064_morning_soc_check
  alias: "EV 064 – Morning SOC Verification"
  description: "Verifies SOC matches predictions and warns if issues"
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: "06:30:00"

  conditions:
    - condition: template
      value_template: >
        {{ states('input_number.ev_trip_km_fraser_today') | float(0) > 0
           or states('input_number.ev_trip_km_heather_today') | float(0) > 0 }}

  actions:
    - variables:
        horace_actual: "{{ states('sensor.horace_battery_level') | float(0) }}"
        horatio_actual: "{{ states('sensor.horatio_battery_level') | float(0) }}"

        fraser_expected: "{{ states('input_number.ev_fraser_departure_soc') | float(0) }}"
        heather_expected: "{{ states('input_number.ev_heather_departure_soc') | float(0) }}"

        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

        fraser_actual: "{{ horace_actual if fraser_car == 'Horace' else horatio_actual }}"
        heather_actual: "{{ horace_actual if heather_car == 'Horace' else horatio_actual }}"

        fraser_diff: "{{ fraser_actual - fraser_expected }}"
        heather_diff: "{{ heather_actual - heather_expected }}"

        fraser_short: "{{ fraser_diff < -5 }}"
        heather_short: "{{ heather_diff < -5 }}"

        external_still_needed: "{{ is_state('input_boolean.ev_external_charge_required', 'on') }}"

        has_problem: "{{ fraser_short or heather_short or external_still_needed }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ has_problem }}"
          sequence:
            - variables:
                alert_msg: >
                  ⚠️ EV Morning Check:
                  {% if fraser_short %}
                  Fraser's {{ fraser_car }}: {{ fraser_actual | round(0) }}% (expected {{ fraser_expected | round(0) }}%)
                  {% endif %}
                  {% if heather_short %}
                  Heather's {{ heather_car }}: {{ heather_actual | round(0) }}% (expected {{ heather_expected | round(0) }}%)
                  {% endif %}
                  {% if external_still_needed %}
                  External charging still required!
                  {% endif %}

            - action: notify.mobile_app_fraser_s_iphone
              data:
                message: "{{ alert_msg }}"
                data:
                  push:
                    interruption-level: time-sensitive

            - action: notify.mobile_app_heather_s_iphone
              data:
                message: "{{ alert_msg }}"
                data:
                  push:
                    interruption-level: time-sensitive

      default:
        - action: logbook.log
          data:
            name: "EV Morning"
            message: "Morning SOC check passed. Fraser={{ fraser_actual | round(0) }}%, Heather={{ heather_actual | round(0) }}%"


