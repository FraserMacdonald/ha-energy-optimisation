###############################################################################
# EV NOTIFICATION AUTOMATIONS
# File: automations/ev/ev_notification_automations.yaml
#
# Numbering: 065-069, 077-082 (notification sub-range, avoiding existing 060-064, 070-076)
# Note: ev_060-064 remain in ev_automations.yaml — not moved.
# ev_070-076 are helper bridges in ev_automations.yaml — avoid those IDs.
#
# Phase 1D notifications: A4, A5, A6, A7, R3, C4
#
# Notification targets:
#   Fraser: notify.mobile_app_fraser_s_iphone
#   Heather: notify.mobile_app_heather_s_iphone
#   Driver: route to the driver assigned to the relevant car
###############################################################################


# ==============================================================================
# A4 — 065 – SOLAR CHARGE STARTED
# Notifies the driver when solar charging begins.
# ==============================================================================
- id: auto_ev_065_solar_charge_started
  alias: "EV 065 – Solar Charge Started"
  description: >
    Notifies the relevant driver when their car begins solar charging,
    with current amps, surplus, and SOC details.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: input_boolean.ev_horace_allow_charging
      to: "on"
    - trigger: state
      entity_id: input_boolean.ev_horatio_allow_charging
      to: "on"

  conditions:
    - condition: state
      entity_id: input_boolean.ev_solar_mode_enabled
      state: "on"
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'input_boolean.ev_horace_allow_charging' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        target: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_charge_limit') | float(80) | round(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_charge_limit') | float(80) | round(0) }}
          {% endif %}
        surplus: "{{ states('sensor.energy_solar_surplus_w') | float(0) | round(0) }}"
        amps: "{{ states('sensor.ev_solar_available_amps') | int(0) }}"
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ fraser_car == car }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Solar Charging"
                message: >
                  {{ car }} solar charging started @ {{ amps }}A ({{ surplus }}W surplus).
                  Current SOC: {{ soc }}%. Target: {{ target }}%.

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ heather_car == car }}"
          sequence:
            - action: notify.mobile_app_heather_s_iphone
              data:
                title: "EV Solar Charging"
                message: >
                  {{ car }} solar charging started @ {{ amps }}A ({{ surplus }}W surplus).
                  Current SOC: {{ soc }}%. Target: {{ target }}%.

    - action: logbook.log
      data:
        name: "EV Solar Charging"
        message: "{{ car }} solar charging started @ {{ amps }}A ({{ surplus }}W surplus). SOC: {{ soc }}%"


# ==============================================================================
# A5 — 066 – SOLAR CHARGE STOPPED
# Notifies the driver when solar charging stops before reaching target.
# ==============================================================================
- id: auto_ev_066_solar_charge_stopped
  alias: "EV 066 – Solar Charge Stopped"
  description: >
    Notifies the relevant driver when solar charging stops due to
    insufficient surplus, with current SOC details.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: input_boolean.ev_horace_allow_charging
      to: "off"
    - trigger: state
      entity_id: input_boolean.ev_horatio_allow_charging
      to: "off"

  conditions:
    - condition: state
      entity_id: input_boolean.ev_solar_mode_enabled
      state: "on"
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'input_boolean.ev_horace_allow_charging' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        target: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_charge_limit') | float(80) | round(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_charge_limit') | float(80) | round(0) }}
          {% endif %}
        surplus: "{{ states('sensor.energy_solar_surplus_w') | float(0) | round(0) }}"
        below_target: "{{ soc | float < target | float }}"
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ below_target }}"
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ fraser_car == car }}"
                  sequence:
                    - action: notify.mobile_app_fraser_s_iphone
                      data:
                        title: "EV Solar Charging Paused"
                        message: >
                          {{ car }} solar charging paused ({{ surplus }}W surplus < minimum).
                          SOC: {{ soc }}%. Will resume when solar returns.

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ heather_car == car }}"
                  sequence:
                    - action: notify.mobile_app_heather_s_iphone
                      data:
                        title: "EV Solar Charging Paused"
                        message: >
                          {{ car }} solar charging paused ({{ surplus }}W surplus < minimum).
                          SOC: {{ soc }}%. Will resume when solar returns.

            - action: logbook.log
              data:
                name: "EV Solar Charging"
                message: "{{ car }} solar charging paused. SOC: {{ soc }}%. Surplus: {{ surplus }}W"


# ==============================================================================
# A6 — 067 – NIGHT CHARGE STARTED
# Notifies Fraser when low-tariff charging begins.
# ==============================================================================
- id: auto_ev_067_night_charge_started
  alias: "EV 067 – Night Charge Started"
  description: >
    Notifies Fraser when a car begins charging during the low tariff window.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id:
        - switch.horace_charge
        - switch.horatio_charge
      to: "on"

  conditions:
    - condition: state
      entity_id: binary_sensor.energy_low_tariff_active
      state: "on"
    - condition: state
      entity_id: sun.sun
      state: "below_horizon"

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'switch.horace_charge' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        target: "{{ states('input_number.ev_night_charge_target_soc') | float(0) | round(0) }}"

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "EV Night Charging"
        message: >
          {{ car }} night charging started. Current: {{ soc }}% → Target: {{ target }}%. Tariff: low.

    - action: notify.mobile_app_heather_s_iphone
      data:
        title: "EV Night Charging"
        message: >
          {{ car }} night charging started. Current: {{ soc }}% → Target: {{ target }}%. Tariff: low.


# ==============================================================================
# A7 — 068 – NIGHT CHARGE COMPLETE
# Notifies both users when overnight charging reaches target SOC.
# ==============================================================================
- id: auto_ev_068_night_charge_complete
  alias: "EV 068 – Night Charge Complete"
  description: >
    Notifies both users when the night-charged car reaches its target SOC.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {% set plan_car = states('input_select.ev_night_charge_car') %}
        {% set target = states('input_number.ev_night_charge_target_soc') | float(0) %}
        {% if plan_car == 'Horace' %}
          {{ states('sensor.horace_battery_level') | float(0) >= target and target > 0 }}
        {% elif plan_car == 'Horatio' %}
          {{ states('sensor.horatio_battery_level') | float(0) >= target and target > 0 }}
        {% else %}
          false
        {% endif %}

  conditions:
    - condition: state
      entity_id: binary_sensor.energy_low_tariff_active
      state: "on"

  actions:
    - variables:
        car: "{{ states('input_select.ev_night_charge_car') }}"
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "EV Fully Charged"
        message: "{{ car }} fully charged: {{ soc }}%. Ready for tomorrow."

    - action: notify.mobile_app_heather_s_iphone
      data:
        title: "EV Fully Charged"
        message: "{{ car }} fully charged: {{ soc }}%. Ready for tomorrow."


# ==============================================================================
# R3 — 069 – CHARGING PROGRESS
# Sends charging progress every 30 minutes while a car is charging.
# ==============================================================================
- id: auto_ev_069_charging_progress
  alias: "EV 069 – Charging Progress"
  description: >
    Sends the relevant driver a charging progress update every 60 minutes
    while their car is actively charging.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      hours: "/1"

  conditions:
    - condition: template
      value_template: >
        {{ is_state('switch.horace_charge', 'on')
           or is_state('switch.horatio_charge', 'on') }}

  actions:
    - variables:
        horace_charging: "{{ is_state('switch.horace_charge', 'on') }}"
        horatio_charging: "{{ is_state('switch.horatio_charge', 'on') }}"
        horace_soc: "{{ states('sensor.horace_battery_level') | float(0) | round(0) }}"
        horatio_soc: "{{ states('sensor.horatio_battery_level') | float(0) | round(0) }}"
        horace_prev: "{{ states('input_number.ev_horace_previous_soc') | float(0) | round(0) }}"
        horatio_prev: "{{ states('input_number.ev_horatio_previous_soc') | float(0) | round(0) }}"
        horace_target: "{{ states('input_number.ev_horace_charge_limit') | float(80) | round(0) }}"
        horatio_target: "{{ states('input_number.ev_horatio_charge_limit') | float(80) | round(0) }}"
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ horace_charging }}"
          sequence:
            - variables:
                horace_delta: "{{ (horace_soc | float - horace_prev | float) | round(0) }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ fraser_car == 'Horace' }}"
                  sequence:
                    - action: notify.mobile_app_fraser_s_iphone
                      data:
                        title: "EV Charging Progress"
                        message: "Horace: {{ horace_soc }}% (+{{ horace_delta }}% in 30min). Target: {{ horace_target }}%."
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ heather_car == 'Horace' }}"
                  sequence:
                    - action: notify.mobile_app_heather_s_iphone
                      data:
                        title: "EV Charging Progress"
                        message: "Horace: {{ horace_soc }}% (+{{ horace_delta }}% in 30min). Target: {{ horace_target }}%."

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ horatio_charging }}"
          sequence:
            - variables:
                horatio_delta: "{{ (horatio_soc | float - horatio_prev | float) | round(0) }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ fraser_car == 'Horatio' }}"
                  sequence:
                    - action: notify.mobile_app_fraser_s_iphone
                      data:
                        title: "EV Charging Progress"
                        message: "Horatio: {{ horatio_soc }}% (+{{ horatio_delta }}% in 30min). Target: {{ horatio_target }}%."
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ heather_car == 'Horatio' }}"
                  sequence:
                    - action: notify.mobile_app_heather_s_iphone
                      data:
                        title: "EV Charging Progress"
                        message: "Horatio: {{ horatio_soc }}% (+{{ horatio_delta }}% in 30min). Target: {{ horatio_target }}%."


# ==============================================================================
# C4 — 070 – TRIP COMPLETE
# Notifies Fraser when a car returns home after a trip.
# ==============================================================================
- id: auto_ev_077_trip_complete
  alias: "EV 077 – Trip Complete"
  description: >
    Notifies Fraser when a car arrives home and SOC has decreased
    since the last recorded departure SOC.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: device_tracker.horace_location
      to: "home"
    - trigger: state
      entity_id: device_tracker.horatio_location
      to: "home"

  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state != 'home' }}

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'device_tracker.horace_location' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        current_soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        departure_soc: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_departure_soc') | float(0) | round(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_departure_soc') | float(0) | round(0) }}
          {% endif %}
        delta: "{{ (departure_soc | float - current_soc | float) | round(0) }}"
        soc_decreased: "{{ delta | float > 0 }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ soc_decreased }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Trip Complete"
                message: "{{ car }} returned home at {{ current_soc }}%. Trip used {{ delta }}%."

            - action: logbook.log
              data:
                name: "EV Trip"
                message: "{{ car }} returned home. SOC: {{ current_soc }}% (used {{ delta }}% on trip)."


# ==============================================================================
# 078 – TRIP FEEDBACK (Predicted vs Actual SOC Use)
# Logs predicted vs actual SOC consumption when car returns home from a trip.
# ==============================================================================
- id: auto_ev_078_trip_feedback
  alias: "EV 078 – Trip Feedback"
  description: >
    Logs predicted vs actual SOC use when a car arrives home after a trip.
    Compares the predicted SOC drop (from trip km and Wh/km) against the
    actual drop for model accuracy analysis.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: device_tracker.horace_location
      to: "home"
    - trigger: state
      entity_id: device_tracker.horatio_location
      to: "home"

  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state != 'home' }}

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'device_tracker.horace_location' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        current_soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) }}
          {% endif %}
        departure_soc: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_departure_soc') | float(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_departure_soc') | float(0) }}
          {% endif %}
        actual_use: "{{ (departure_soc | float - current_soc | float) | round(1) }}"

        # Resolve driver from car assignment
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"
        driver: >
          {% if fraser_car == car %}fraser
          {% elif heather_car == car %}heather
          {% else %}unknown{% endif %}

        # Trip km (driver-specific)
        trip_km: >
          {% if driver == 'fraser' %}
            {{ states('input_number.ev_trip_km_fraser_today') | float(0) }}
          {% elif driver == 'heather' %}
            {{ states('input_number.ev_trip_km_heather_today') | float(0) }}
          {% else %}
            0
          {% endif %}

        # Car-specific parameters: Horace 70kWh/180Wh/km, Horatio 90kWh/215Wh/km
        battery_kwh: "{{ 70 if car == 'Horace' else 90 }}"
        wh_per_km: "{{ 180 if car == 'Horace' else 215 }}"

        # Predicted SOC use as percentage
        predicted_use: >
          {% if trip_km | float > 0 %}
            {{ (trip_km | float * wh_per_km | float / (battery_kwh | float * 10)) | round(1) }}
          {% else %}
            0
          {% endif %}

    - condition: template
      value_template: "{{ actual_use | float > 0 and trip_km | float > 0 }}"

    - action: shell_command.log_feedback
      data:
        system: ev
        metric: trip_soc_use
        predicted: "{{ predicted_use }}"
        actual: "{{ actual_use }}"
        context: >
          {{ {'car': car | trim,
              'trip_km': trip_km | float,
              'departure_soc': departure_soc | float,
              'arrival_soc': current_soc | float,
              'wh_per_km': wh_per_km | int
          } | tojson }}


# ==============================================================================
# 079 – EV MORNING BRIEFING
# Comprehensive morning notification with car recommendation and status.
# ==============================================================================
- id: auto_ev_079_morning_briefing
  alias: "EV 079 – Morning Briefing"
  description: >
    Sends both users a comprehensive morning briefing with battery levels,
    car recommendation, departure time, climate plan, plug status, and
    overnight charging summary.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: "06:30:00"

  conditions:
    - condition: template
      value_template: >
        {{ is_state('device_tracker.horace_location', 'home')
           or is_state('device_tracker.horatio_location', 'home') }}

  actions:
    - variables:
        # Battery levels + estimated range
        horace_soc: "{{ states('sensor.horace_battery_level') | float(0) | round(0) }}"
        horatio_soc: "{{ states('sensor.horatio_battery_level') | float(0) | round(0) }}"
        horace_range: "{{ (horace_soc | float * 70 * 10 / 180) | round(0) }}"
        horatio_range: "{{ (horatio_soc | float * 90 * 10 / 215) | round(0) }}"

        # Location
        horace_home: "{{ is_state('device_tracker.horace_location', 'home') }}"
        horatio_home: "{{ is_state('device_tracker.horatio_location', 'home') }}"

        # Plug status (treat unknown/unavailable as plugged — car is asleep)
        horace_plugged: "{{ states('binary_sensor.horace_charge_cable') != 'off' }}"
        horatio_plugged: "{{ states('binary_sensor.horatio_charge_cable') != 'off' }}"

        # Trip plans
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"
        fraser_km: "{{ states('input_number.ev_trip_km_fraser_today') | float(0) }}"
        heather_km: "{{ states('input_number.ev_trip_km_heather_today') | float(0) }}"
        fraser_dep_soc: "{{ states('input_number.ev_fraser_departure_soc') | float(0) | round(0) }}"
        heather_dep_soc: "{{ states('input_number.ev_heather_departure_soc') | float(0) | round(0) }}"

        # Overnight charging summary
        horace_solar: "{{ states('input_number.ev_horace_solar_kwh_today') | float(0) | round(1) }}"
        horace_grid: "{{ states('input_number.ev_horace_grid_kwh_today') | float(0) | round(1) }}"
        horatio_solar: "{{ states('input_number.ev_horatio_solar_kwh_today') | float(0) | round(1) }}"
        horatio_grid: "{{ states('input_number.ev_horatio_grid_kwh_today') | float(0) | round(1) }}"
        total_charged: >
          {{ (horace_solar | float + horace_grid | float
              + horatio_solar | float + horatio_grid | float) | round(1) }}

        # Outdoor temp for climate recommendation
        outdoor_temp: "{{ states('sensor.la_dole_temperature') | float(10) }}"
        needs_climate: "{{ outdoor_temp | float < 10 or outdoor_temp | float > 25 }}"

        # Car recommendation (higher SOC wins if both have trips)
        recommended_car: >
          {% if fraser_km | float > 0 and horace_soc | float >= horatio_soc | float %}
            Horace
          {% elif fraser_km | float > 0 %}
            Horatio
          {% else %}
            {{ fraser_car }}
          {% endif %}

    - variables:
        fraser_dep_time: "{{ states('input_datetime.ev_fraser_departure_time') | as_timestamp | timestamp_custom('%H:%M', true) if states('input_datetime.ev_fraser_departure_time') not in ['unknown', 'unavailable'] else 'N/A' }}"
        heather_dep_time: "{{ states('input_datetime.ev_heather_departure_time') | as_timestamp | timestamp_custom('%H:%M', true) if states('input_datetime.ev_heather_departure_time') not in ['unknown', 'unavailable'] else 'N/A' }}"
        fraser_travel_min: "{{ states('input_number.ev_fraser_travel_minutes') | float(0) | round(0) }}"
        heather_travel_min: "{{ states('input_number.ev_heather_travel_minutes') | float(0) | round(0) }}"

    - variables:
        car_status: >
          Horace: {{ horace_soc }}% ({{ horace_range }}km) {{ 'plugged' if horace_plugged else 'NOT plugged' }} {{ 'HOME' if horace_home else 'AWAY' }}
          Horatio: {{ horatio_soc }}% ({{ horatio_range }}km) {{ 'plugged' if horatio_plugged else 'NOT plugged' }} {{ 'HOME' if horatio_home else 'AWAY' }}
        overnight_summary: >
          {% if total_charged | float > 0 %}
          Overnight: {{ total_charged }}kWh charged ({{ (horace_solar | float + horatio_solar | float) | round(1) }}kWh solar, {{ (horace_grid | float + horatio_grid | float) | round(1) }}kWh low-tariff).
          {% endif %}
        fraser_msg: >
          {{ car_status }}
          {% if fraser_km | float > 0 %}
          Your trip: {{ fraser_car }}, {{ fraser_km | round(0) }}km, depart {{ fraser_dep_time }}, ~{{ fraser_travel_min }} min drive, need {{ fraser_dep_soc }}%.
          {% if recommended_car != fraser_car %}Recommended car: {{ recommended_car }} (higher SOC).{% endif %}
          {% else %}
          No trip planned for you today.
          {% endif %}
          {% if heather_km | float > 0 %}
          Heather: {{ heather_car }}, {{ heather_km | round(0) }}km.
          {% endif %}
          {{ overnight_summary }}
          {% if needs_climate and fraser_km | float > 0 %}
          Climate: {{ outdoor_temp }}°C — pre-conditioning will activate before departure.
          {% endif %}
        heather_msg: >
          {{ car_status }}
          {% if heather_km | float > 0 %}
          Your trip: {{ heather_car }}, {{ heather_km | round(0) }}km, depart {{ heather_dep_time }}, ~{{ heather_travel_min }} min drive, need {{ heather_dep_soc }}%.
          {% set my_car_plugged = horace_plugged if heather_car == 'Horace' else horatio_plugged %}
          {% if not my_car_plugged %}{{ heather_car }} is NOT plugged in.{% endif %}
          {% else %}
          No trip planned for you today.
          {% endif %}
          {% if fraser_km | float > 0 %}
          Fraser: {{ fraser_car }}, {{ fraser_km | round(0) }}km.
          {% endif %}
          {{ overnight_summary }}
          {% if needs_climate and heather_km | float > 0 %}
          Climate: {{ outdoor_temp }}°C — pre-conditioning will activate before departure.
          {% endif %}

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "EV Morning Briefing"
        message: "{{ fraser_msg }}"

    - action: notify.mobile_app_heather_s_iphone
      data:
        title: "EV Morning Briefing"
        message: "{{ heather_msg }}"

    - action: logbook.log
      data:
        name: "EV Morning"
        message: "Briefing sent. Horace {{ horace_soc }}%, Horatio {{ horatio_soc }}%."


# ==============================================================================
# 080 – ALWAYS ONE CAR PLUGGED NAG
# Periodically nags when no car is plugged in at home.
# ==============================================================================
- id: auto_ev_080_always_plugged_nag
  alias: "EV 080 – Always One Car Plugged"
  description: >
    Nags every 30 minutes when at least one car is at home but none are
    plugged in. Escalates urgency after 2 hours.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    # At least one car is at home
    - condition: template
      value_template: >
        {{ is_state('device_tracker.horace_location', 'home')
           or is_state('device_tracker.horatio_location', 'home') }}
    # No car is plugged in (only nag when explicitly off, not unknown/unavailable)
    - condition: template
      value_template: >
        {% set h = states('binary_sensor.horace_charge_cable') %}
        {% set r = states('binary_sensor.horatio_charge_cable') %}
        {{ h == 'off' and r == 'off' }}

  actions:
    - variables:
        horace_home: "{{ is_state('device_tracker.horace_location', 'home') }}"
        horatio_home: "{{ is_state('device_tracker.horatio_location', 'home') }}"
        horace_soc: "{{ states('sensor.horace_battery_level') | float(0) | round(0) }}"
        horatio_soc: "{{ states('sensor.horatio_battery_level') | float(0) | round(0) }}"
        # Recommend the car with lower SOC
        plug_car: >
          {% if horace_home and horatio_home %}
            {{ 'Horace' if horace_soc | float <= horatio_soc | float else 'Horatio' }}
          {% elif horace_home %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        plug_soc: >
          {{ horace_soc if plug_car == 'Horace' else horatio_soc }}

    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "Plug In a Tesla"
        message: >
          No car is plugged in. Please plug in {{ plug_car }} ({{ plug_soc }}%).
        data:
          push:
            interruption-level: time-sensitive

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_state('device_tracker.heather_s_iphone', 'home') }}"
          sequence:
            - action: notify.mobile_app_heather_s_iphone
              data:
                title: "Plug In a Tesla"
                message: >
                  No car is plugged in. Please plug in {{ plug_car }} ({{ plug_soc }}%).
                data:
                  push:
                    interruption-level: time-sensitive

    - action: logbook.log
      data:
        name: "EV Plug Reminder"
        message: "No car plugged in. Recommended: {{ plug_car }} ({{ plug_soc }}%)."


# ==============================================================================
# 081 – ARRIVAL PLUG-IN REMINDER
# Reminds to plug in a car 10 minutes after arriving home.
# ==============================================================================
- id: auto_ev_081_arrival_plug_reminder
  alias: "EV 081 – Arrival Plug-In Reminder"
  description: >
    When a car arrives home, waits 10 minutes then checks if it's plugged in.
    If not, sends a reminder to the relevant driver.
  mode: parallel
  max: 2
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: device_tracker.horace_location
      to: "home"
    - trigger: state
      entity_id: device_tracker.horatio_location
      to: "home"

  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state != 'home' }}

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'device_tracker.horace_location' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        cable_entity: >
          {% if car == 'Horace' %}
            binary_sensor.horace_charge_cable
          {% else %}
            binary_sensor.horatio_charge_cable
          {% endif %}
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

    # Wait 10 minutes for user to plug in
    - delay:
        minutes: 10

    # Check if still not plugged (only nag when explicitly off)
    - condition: template
      value_template: >
        {{ states(cable_entity | trim) == 'off' }}

    - variables:
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}

    # Notify the driver of that car
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ fraser_car | trim == car | trim }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "Plug In {{ car | trim }}"
                message: >
                  You've been home 10 minutes — please plug in {{ car | trim }} ({{ soc }}%).

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ heather_car | trim == car | trim }}"
          sequence:
            - action: notify.mobile_app_heather_s_iphone
              data:
                title: "Plug In {{ car | trim }}"
                message: >
                  You've been home 10 minutes — please plug in {{ car | trim }} ({{ soc }}%).

    # Fallback: if no driver assigned, notify Fraser
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ fraser_car | trim != car | trim
                   and heather_car | trim != car | trim }}
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "Plug In {{ car | trim }}"
                message: >
                  {{ car | trim }} arrived home 10 min ago and isn't plugged in ({{ soc }}%).


# ==============================================================================
# 082 – UNEXPECTED DISCONNECT
# Alerts when a car is unplugged at home while below charge target.
# ==============================================================================
- id: auto_ev_082_unexpected_disconnect
  alias: "EV 082 – Unexpected Disconnect"
  description: >
    Alerts when a car's charge cable is disconnected while at home and
    the battery is below the charge target.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: binary_sensor.horace_charge_cable
      to: "off"
    - trigger: state
      entity_id: binary_sensor.horatio_charge_cable
      to: "off"

  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state == 'on' }}

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'binary_sensor.horace_charge_cable' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        at_home: >
          {% if car == 'Horace' %}
            {{ is_state('device_tracker.horace_location', 'home') }}
          {% else %}
            {{ is_state('device_tracker.horatio_location', 'home') }}
          {% endif %}
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        target: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_charge_limit') | float(80) | round(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_charge_limit') | float(80) | round(0) }}
          {% endif %}
        below_target: "{{ soc | float < target | float }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ at_home and below_target }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "Tesla Unplugged"
                message: >
                  {{ car | trim }} was unplugged at {{ soc }}% (target {{ target }}%). Please reconnect.
                data:
                  push:
                    interruption-level: time-sensitive

            - action: logbook.log
              data:
                name: "EV Disconnect"
                message: >
                  {{ car | trim }} unplugged at {{ soc }}% (target {{ target }}%).


# ==============================================================================
# 083 – SOLAR CHARGE TARGET REACHED
# Notifies the assigned driver when solar charging reaches the charge limit.
# ==============================================================================
- id: auto_ev_083_solar_target_reached
  alias: "EV 083 – Solar Charge Target Reached"
  description: >
    Notifies the assigned driver when their car reaches the charge limit
    during a solar charging session.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: template
      value_template: >
        {% set plugged = states('sensor.ev_plugged_vehicle') %}
        {% if plugged == 'Horace' %}
          {% set soc = states('sensor.horace_battery_level') | float(0) %}
          {% set limit = states('input_number.ev_horace_charge_limit') | float(80) %}
          {{ soc >= limit }}
        {% elif plugged == 'Horatio' %}
          {% set soc = states('sensor.horatio_battery_level') | float(0) %}
          {% set limit = states('input_number.ev_horatio_charge_limit') | float(80) %}
          {{ soc >= limit }}
        {% else %}
          false
        {% endif %}

  conditions:
    - condition: state
      entity_id: input_boolean.ev_solar_mode_enabled
      state: "on"
    - condition: state
      entity_id: sun.sun
      state: "above_horizon"
    - condition: template
      value_template: >
        {{ states('sensor.ev_plugged_vehicle') in ['Horace', 'Horatio'] }}

  actions:
    - variables:
        car: "{{ states('sensor.ev_plugged_vehicle') }}"
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        solar_kwh: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_solar_kwh_today') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.ev_horatio_solar_kwh_today') | float(0) | round(1) }}
          {% endif %}
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"
        msg: "{{ car }} reached {{ soc }}% from solar. {{ solar_kwh }}kWh charged today."

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ fraser_car == car }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Solar Target Reached"
                message: "{{ msg }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ heather_car == car }}"
          sequence:
            - action: notify.mobile_app_heather_s_iphone
              data:
                title: "EV Solar Target Reached"
                message: "{{ msg }}"

    # Fallback: if no driver assigned, notify Fraser
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ fraser_car != car and heather_car != car }}
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Solar Target Reached"
                message: "{{ msg }}"

    - action: logbook.log
      data:
        name: "EV Solar Charging"
        message: "{{ car }} reached solar charge target: {{ soc }}%. {{ solar_kwh }}kWh today."


# ==============================================================================
# 084 – CHARGING SESSION ENDED
# Notifies the assigned driver when charging stops (any source).
# ==============================================================================
- id: auto_ev_084_charging_session_ended
  alias: "EV 084 – Charging Session Ended"
  description: >
    Notifies the assigned driver when their car stops charging,
    with final SOC and energy summary.
  mode: parallel
  max: 2
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: switch.horace_charge
      from: "on"
      to: "off"
    - trigger: state
      entity_id: switch.horatio_charge
      from: "on"
      to: "off"

  actions:
    - variables:
        car: >
          {% if trigger.entity_id == 'switch.horace_charge' %}
            Horace
          {% else %}
            Horatio
          {% endif %}
        soc: >
          {% if car == 'Horace' %}
            {{ states('sensor.horace_battery_level') | float(0) | round(0) }}
          {% else %}
            {{ states('sensor.horatio_battery_level') | float(0) | round(0) }}
          {% endif %}
        target: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_charge_limit') | float(80) | round(0) }}
          {% else %}
            {{ states('input_number.ev_horatio_charge_limit') | float(80) | round(0) }}
          {% endif %}
        solar_kwh: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_solar_kwh_today') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.ev_horatio_solar_kwh_today') | float(0) | round(1) }}
          {% endif %}
        grid_kwh: >
          {% if car == 'Horace' %}
            {{ states('input_number.ev_horace_grid_kwh_today') | float(0) | round(1) }}
          {% else %}
            {{ states('input_number.ev_horatio_grid_kwh_today') | float(0) | round(1) }}
          {% endif %}
        reached_target: "{{ soc | float >= target | float }}"
        source: >
          {% if is_state('sun.sun', 'above_horizon') and is_state('input_boolean.ev_solar_mode_enabled', 'on') %}
            solar
          {% elif is_state('binary_sensor.energy_low_tariff_active', 'on') %}
            low tariff
          {% else %}
            grid
          {% endif %}
        fraser_car: "{{ states('input_select.ev_fraser_assigned_car') }}"
        heather_car: "{{ states('input_select.ev_heather_assigned_car') }}"

    - variables:
        msg: >
          {{ car }} charging stopped ({{ source }}).
          SOC: {{ soc }}%{{ ' — target reached' if reached_target else ' / ' ~ target ~ '% target' }}.
          Today: {{ solar_kwh }}kWh solar, {{ grid_kwh }}kWh grid.

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ fraser_car == car }}"
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Charging {{ 'Complete' if reached_target else 'Stopped' }}"
                message: "{{ msg }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ heather_car == car }}"
          sequence:
            - action: notify.mobile_app_heather_s_iphone
              data:
                title: "EV Charging {{ 'Complete' if reached_target else 'Stopped' }}"
                message: "{{ msg }}"

    # Fallback: if no driver assigned, notify Fraser
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ fraser_car != car and heather_car != car }}
          sequence:
            - action: notify.mobile_app_fraser_s_iphone
              data:
                title: "EV Charging {{ 'Complete' if reached_target else 'Stopped' }}"
                message: "{{ msg }}"

    - action: logbook.log
      data:
        name: "EV Charging"
        message: "{{ car }} charging stopped. SOC: {{ soc }}%. Solar: {{ solar_kwh }}kWh, Grid: {{ grid_kwh }}kWh."
