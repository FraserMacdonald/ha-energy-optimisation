###############################################################################
# ENERGY SOLAR FORECAST – AUTOMATIONS
# File: automations/energy/energy_solar_forecast_automations.yaml
#
# Automations that trigger the solar forecast engine and supply planner.
# All gated by input_boolean.energy_solar_forecast_enabled.
#
# Format: YAML list for automation: !include_dir_merge_list automations/
#
# Automations:
#   020 – Solar Forecast Runner    (every 15 min, 04:00-22:00)
#   021 – Solar Actual Logger      (every 15 min)
#   022 – Solar Forecast Comparison (:05 past each hour)
#   023 – Solar Calibration        (Sunday 23:30)
#   024 – Solar Banking Calculator (every 30 min)
#   025 – Tariff Transition Logger (on tariff change)
#   028 – Supply Planner           (every 15 min + reactive triggers)
###############################################################################


# =============================================================================
# 020 – SOLAR FORECAST RUNNER
# Generates a 48-hour solar forecast every 15 minutes during daylight.
# Uses Met.no cloud data + NOAA sun position + dual-slope clear-sky model.
# Now produces 192 rows (15-min intervals) per run.
# =============================================================================
- id: auto_energy_020_solar_forecast
  alias: "Energy 020 – Solar Forecast Runner"
  description: >
    Triggers the solar forecast engine every 15 minutes between 04:00 and
    22:00 local time. Generates a 48-hour forecast at 15-min resolution
    with per-component tracking and stores results in MariaDB + HA helpers.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/15"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: template
      value_template: >
        {% set hour = now().hour %}
        {{ 4 <= hour <= 22 }}

  actions:
    - action: shell_command.solar_forecast


# =============================================================================
# 021 – SOLAR ACTUAL LOGGER
# Logs current SolarEdge production every 15 minutes (all hours).
# Writes 15-min slots to MariaDB, also accumulates hourly for backward compat.
# =============================================================================
- id: auto_energy_021_solar_actual
  alias: "Energy 021 – Solar Actual Logger"
  description: >
    Logs current SolarEdge production to MariaDB every 15 minutes.
    Writes to both 15-min and hourly tables. Runs 24/7.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/15"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"

  actions:
    - action: shell_command.solar_actual


# =============================================================================
# 022 – SOLAR FORECAST COMPARISON
# Compares forecast vintages against actual production at :05 past each hour.
# Now includes per-component accuracy (cloud, temp, east/west arrays).
# =============================================================================
- id: auto_energy_022_solar_compare
  alias: "Energy 022 – Solar Forecast Comparison"
  description: >
    At 5 minutes past each hour, compares forecast vintages for completed
    slots against actual production. Computes per-component errors (cloud,
    temperature, east/west arrays) and updates bias corrections.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      hours: "*"
      minutes: "5"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: template
      value_template: >
        {% set hour = now().hour %}
        {{ 5 <= hour <= 22 }}

  actions:
    - action: shell_command.solar_compare


# =============================================================================
# 023 – SOLAR CALIBRATION
# Weekly auto-calibration from clear-sky days. Runs Sunday at 23:30.
# Now calibrates per-array (east/west) using morning/afternoon split.
# =============================================================================
- id: auto_energy_023_solar_calibrate
  alias: "Energy 023 – Solar Calibration"
  description: >
    Weekly calibration of the clear-sky model. Now calibrates east and west
    arrays independently using morning/afternoon production split.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: "23:30:00"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: time
      weekday:
        - sun

  actions:
    - action: shell_command.solar_calibrate


# =============================================================================
# 025 – TARIFF TRANSITION LOGGER
# Logs when the tariff window transitions between high and low.
# =============================================================================
- id: auto_energy_025_tariff_transition
  alias: "Energy 025 – Tariff Transition Logger"
  description: >
    Logs a decision whenever the energy tariff changes between high and low.
    Provides audit trail of tariff window transitions.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: sensor.energy_tariff_current

  conditions:
    - condition: template
      value_template: >
        {{ trigger.to_state is not none
           and trigger.from_state is not none
           and trigger.to_state.state not in ['unavailable', 'unknown']
           and trigger.from_state.state != trigger.to_state.state }}

  actions:
    - variables:
        new_tariff: "{{ trigger.to_state.state }}"
        old_tariff: "{{ trigger.from_state.state }}"
        code: "tariff_shift_to_{{ new_tariff }}"
        rate: "{{ state_attr('sensor.energy_tariff_current', 'rate_chf') | float(0) }}"
        day_of_week: "{{ now().strftime('%A') }}"
        hour: "{{ now().hour }}"

    - action: shell_command.log_decision
      data:
        system: energy
        automation_id: auto_energy_025
        decision_code: "{{ code }}"
        decision_text: "Tariff changed from {{ old_tariff }} to {{ new_tariff }}"
        context: >
          {{ {'old_tariff': old_tariff,
              'new_tariff': new_tariff,
              'rate_chf': rate | float,
              'day_of_week': day_of_week,
              'hour': hour | int
          } | tojson }}


# =============================================================================
# 024 – SOLAR BANKING CALCULATOR
# Computes optimal thermal banking target for the jacuzzi every 30 minutes.
# NOTE: Superseded by 028 (supply planner) but kept for backward compat.
# =============================================================================
- id: auto_energy_024_solar_banking
  alias: "Energy 024 – Solar Banking Calculator"
  description: >
    Runs every 30 minutes to compute the optimal jacuzzi banking target.
    Superseded by the supply planner (028) but kept for backward compat.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"

  actions:
    - action: shell_command.solar_banking


# =============================================================================
# 028 – SUPPLY PLANNER
# Generates a 48-hour cost-optimal supply plan every 15 minutes.
# Schedules jacuzzi heating and EV charging to minimize total cost
# using forward simulation with marginal cost comparison.
# =============================================================================
- id: auto_energy_028_supply_planner
  alias: "Energy 028 – Supply Planner"
  description: >
    Generates a 48-hour cost-optimal supply plan every 15 minutes.
    Uses forward simulation to schedule jacuzzi heating and EV charging
    concurrently when cost-effective. Reactive triggers for state changes.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    # Regular 15-min schedule
    - trigger: time_pattern
      minutes: "/15"
    # Reactive: EV plugged/unplugged
    - trigger: state
      entity_id: sensor.ev_plugged_vehicle
    # Reactive: jacuzzi calendar event change
    - trigger: state
      entity_id: calendar.jacuzzi_schedule
    # Reactive: solar production deviates >30% from forecast for 15 min
    - trigger: template
      value_template: >
        {% set actual = states('sensor.solaredge_current_power') | float(0) %}
        {% set unit = state_attr('sensor.solaredge_current_power', 'unit_of_measurement') %}
        {% set actual = actual * 1000 if unit == 'kW' else actual %}
        {% set forecast = states('input_number.energy_solar_forecast_current_hour_w') | float(1) %}
        {{ (actual - forecast) | abs / [forecast, 100] | max > 0.3 }}
      for:
        minutes: 15

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"

  actions:
    - action: shell_command.solar_plan
