###############################################################################
# ENERGY SOLAR FORECAST – AUTOMATIONS
# File: automations/energy/energy_solar_forecast_automations.yaml
#
# Phase 2A-2C: Automations that trigger the solar forecast engine.
# All gated by input_boolean.energy_solar_forecast_enabled.
#
# Format: YAML list for automation: !include_dir_merge_list automations/
#
# Automations:
#   020 – Solar Forecast Runner    (every 30 min, 04:00-22:00)
#   021 – Solar Actual Logger      (every 30 min)
#   022 – Solar Forecast Comparison (:05 past each hour)
#   023 – Solar Calibration        (Sunday 23:30)
#   024 – Solar Banking Calculator (every 30 min)
#   025 – Tariff Transition Logger (on tariff change)
###############################################################################


# =============================================================================
# 020 – SOLAR FORECAST RUNNER
# Generates a 48-hour solar forecast every 30 minutes during daylight.
# Uses Met.no cloud data + NOAA sun position + dual-slope clear-sky model.
# =============================================================================
- id: auto_energy_020_solar_forecast
  alias: "Energy 020 – Solar Forecast Runner"
  description: >
    Triggers the solar forecast engine every 30 minutes between 04:00 and
    22:00 local time. Generates a 48-hour forecast using clear-sky model
    with Met.no cloud overlay and stores results in MariaDB + HA helpers.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: template
      value_template: >
        {% set hour = now().hour %}
        {{ 4 <= hour <= 22 }}

  actions:
    - action: shell_command.solar_forecast


# =============================================================================
# 021 – SOLAR ACTUAL LOGGER
# Logs current SolarEdge production every 30 minutes (all hours).
# Accumulates energy samples into hourly rows in MariaDB.
# =============================================================================
- id: auto_energy_021_solar_actual
  alias: "Energy 021 – Solar Actual Logger"
  description: >
    Logs current SolarEdge production to MariaDB every 30 minutes.
    Accumulates half-hourly samples into hourly energy totals.
    Runs 24/7 to capture any production (even night = 0W baseline).
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"

  actions:
    - action: shell_command.solar_actual


# =============================================================================
# 022 – SOLAR FORECAST COMPARISON
# Compares forecast vintages against actual production at :05 past each hour.
# Runs slightly after the hour to ensure the actual logger has written data.
# =============================================================================
- id: auto_energy_022_solar_compare
  alias: "Energy 022 – Solar Forecast Comparison"
  description: >
    At 5 minutes past each hour, compares all forecast vintages for completed
    hours against actual production. Computes total error, error percentage,
    and variance decomposition (model vs weather error). Updates quality
    metrics in HA helpers.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      hours: "*"
      minutes: "5"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: template
      value_template: >
        {% set hour = now().hour %}
        {{ 5 <= hour <= 22 }}

  actions:
    - action: shell_command.solar_compare


# =============================================================================
# 023 – SOLAR CALIBRATION
# Weekly auto-calibration from clear-sky days. Runs Sunday at 23:30.
# Updates the calibration factor using exponentially weighted mean of
# actual/clear-sky ratios from the last 90 days of clear-sky days.
# =============================================================================
- id: auto_energy_023_solar_calibrate
  alias: "Energy 023 – Solar Calibration"
  description: >
    Weekly calibration of the clear-sky model. Analyses clear-sky days
    (avg cloud < 20%) from the last 90 days, computes actual-to-model
    ratio, and updates the calibration factor via EWM (alpha=0.1).
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: "23:30:00"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"
    - condition: time
      weekday:
        - sun

  actions:
    - action: shell_command.solar_calibrate


# =============================================================================
# 025 – TARIFF TRANSITION LOGGER
# Logs when the tariff window transitions between high and low.
# =============================================================================
- id: auto_energy_025_tariff_transition
  alias: "Energy 025 – Tariff Transition Logger"
  description: >
    Logs a decision whenever the energy tariff changes between high and low.
    Provides audit trail of tariff window transitions.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: sensor.energy_tariff_current

  conditions:
    - condition: template
      value_template: >
        {{ trigger.to_state is not none
           and trigger.from_state is not none
           and trigger.to_state.state not in ['unavailable', 'unknown']
           and trigger.from_state.state != trigger.to_state.state }}

  actions:
    - variables:
        new_tariff: "{{ trigger.to_state.state }}"
        old_tariff: "{{ trigger.from_state.state }}"
        code: "{{ 'tariff_shift_to_high' if new_tariff == 'high' else 'tariff_shift_to_low' }}"
        rate: "{{ state_attr('sensor.energy_tariff_current', 'rate_chf') | float(0) }}"
        day_of_week: "{{ now().strftime('%A') }}"
        hour: "{{ now().hour }}"

    - action: shell_command.log_decision
      data:
        system: energy
        automation_id: auto_energy_025
        decision_code: "{{ code }}"
        decision_text: "Tariff changed from {{ old_tariff }} to {{ new_tariff }}"
        context: >
          {{ {'old_tariff': old_tariff,
              'new_tariff': new_tariff,
              'rate_chf': rate | float,
              'day_of_week': day_of_week,
              'hour': hour | int
          } | tojson }}


# =============================================================================
# 024 – SOLAR BANKING CALCULATOR
# Computes optimal thermal banking target for the jacuzzi every 30 minutes.
# Uses calendar events, solar forecast, tariff schedule, and Met.no ambient
# forecast to determine when to pre-heat during cheap energy periods.
# =============================================================================
- id: auto_energy_024_solar_banking
  alias: "Energy 024 – Solar Banking Calculator"
  description: >
    Runs every 30 minutes to compute the optimal jacuzzi banking target
    temperature. Uses backward induction from the next calendar event through
    cheap/expensive energy windows to determine how much to pre-heat during
    low-cost periods (solar surplus or low tariff).
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      minutes: "/30"

  conditions:
    - condition: state
      entity_id: input_boolean.energy_solar_forecast_enabled
      state: "on"

  actions:
    - action: shell_command.solar_banking
