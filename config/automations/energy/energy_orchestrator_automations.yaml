###############################################################################
# ENERGY ORCHESTRATOR – AUTOMATIONS
# File: automations/energy/energy_orchestrator_automations.yaml
#
# Minimax Regret Priority Waterfall: Replaces the old 3×5×3 scenario matrix
# with a tiered priority waterfall. Each 30s cycle walks tiers 0–8, allocating
# surplus from highest priority down.
#
# Format: YAML list for automation: !include_dir_merge_list automations/
#
# Automations:
#   001 – Priority Waterfall     (core loop, every 30 s)
#   026 – Pre-Peak Readiness     (15:00 weekdays)
#   060 – Decision Logger        (logbook audit trail)
#   061 – Conflict Alert         (solar contention notification)
###############################################################################


# =============================================================================
# 001 – PRIORITY WATERFALL
# Main orchestrator loop. Walks tiers 0–8, allocating solar surplus from
# highest priority down. Sets legacy gate booleans for backward compatibility.
#
# Tier 0: Safety (freeze/low SOC) + Greenhouse photoperiod
# Tier 1: Trip-critical car (EV state X)
# Tier 2: Battery evening charge (weekday before 17:00)
# Tier 3: Jacuzzi event (states C/D)
# Tier 4: Greenhouse LED dimming (future)
# Tier 5: Car buffer to 80% (EV state Y + below buffer target)
# Tier 6: Jacuzzi standby/banking (state B)
# Tier 7: Battery additional (below 100%)
# Tier 8: Export (no allocation)
# =============================================================================
- id: auto_energy_001_evaluate_scenario
  alias: "Energy 001 – Priority Waterfall"
  description: >
    Main orchestrator loop. Walks tiers 0–8 every 30s, allocating solar
    surplus from highest priority down. Sets legacy gate booleans and new
    tier/allocation outputs. Updates heartbeat for subsystem fallback.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time_pattern
      seconds: "/30"

  conditions:
    - condition: template
      value_template: >
        {{ states('sensor.energy_jacuzzi_demand_scenario') not in ['unknown', 'unavailable']
           and states('sensor.energy_ev_demand_scenario') not in ['unknown', 'unavailable'] }}

  actions:
    # -----------------------------------------------------------------
    # Block 1: Read all inputs
    # -----------------------------------------------------------------
    - variables:
        jac: "{{ states('sensor.energy_jacuzzi_demand_scenario') }}"
        ev: "{{ states('sensor.energy_ev_demand_scenario') }}"
        prod: "{{ states('sensor.energy_production_scenario') }}"

        # Solar surplus — if sensor unavailable, treat as 0
        surplus_raw: "{{ states('sensor.energy_solar_surplus_w') }}"
        solar_available: "{{ surplus_raw not in ['unknown', 'unavailable'] }}"
        surplus: "{{ surplus_raw | float(0) if solar_available else 0 }}"

        low_tariff: "{{ is_state('binary_sensor.energy_low_tariff_active', 'on') }}"
        high_tariff: "{{ is_state('binary_sensor.energy_high_tariff_active', 'on') }}"

        # EV parameters
        voltage: "{{ states('input_number.ev_voltage') | float(230) }}"
        phases: "{{ states('input_number.ev_phases') | int(3) }}"
        min_amps: "{{ states('input_number.ev_min_amps') | int(5) }}"
        max_amps: "{{ states('input_number.ev_charger_max_amps') | int(16) }}"
        ev_min_w: "{{ min_amps | int * voltage | float * phases | int }}"

        jac_w: 6000
        buffer_target: "{{ states('input_number.energy_ev_buffer_target_soc') | float(80) }}"

        # Battery
        battery_installed: "{{ is_state('input_boolean.energy_battery_installed', 'on') }}"
        battery_needs_evening: "{{ is_state('binary_sensor.energy_battery_needs_evening_charge', 'on') }}"
        battery_soc: "{{ states('sensor.energy_battery_soc') | float(100) }}"

        # Greenhouse
        greenhouse_online: "{{ is_state('input_boolean.energy_greenhouse_online', 'on') }}"
        photoperiod_active: "{{ is_state('binary_sensor.energy_greenhouse_photoperiod_active', 'on') }}"

        # Watchdog
        watchdog: "{{ states('sensor.watchdog_system_health') }}"

        # Car SOCs for buffer check
        horace_soc: "{{ states('input_number.ev_horace_current_soc') | float(100) }}"
        horatio_soc: "{{ states('input_number.ev_horatio_current_soc') | float(100) }}"
        horace_home: "{{ is_state('device_tracker.horace_location', 'home') }}"
        horatio_home: "{{ is_state('device_tracker.horatio_location', 'home') }}"
        any_car_below_buffer: >
          {{ (horace_home and horace_soc < buffer_target | float)
             or (horatio_home and horatio_soc < buffer_target | float) }}

    # -----------------------------------------------------------------
    # Block 2: Read supply plan OR walk legacy tiers
    # If the supply planner has run recently (<30 min), use its output.
    # Otherwise fall back to legacy tier allocation.
    # Tier 0 (safety) always runs independently of the plan.
    # -----------------------------------------------------------------
    - variables:
        remaining_0: "{{ surplus | float }}"

        # -- Tier 0: Safety (always independent of plan) --
        tier0_safety: "{{ jac == 'A' or horace_soc | float < 10 or horatio_soc | float < 10 }}"
        tier0_greenhouse: "{{ greenhouse_online | bool and photoperiod_active | bool }}"

        # -- Check if supply plan is fresh --
        plan_status: "{{ states('input_select.energy_plan_status') }}"
        plan_action: "{{ states('input_select.energy_plan_current_action') }}"
        plan_is_fresh: >
          {% set status = states('input_select.energy_plan_status') %}
          {% if status in ['none', 'unknown', 'unavailable'] %}
            false
          {% else %}
            true
          {% endif %}

    # -----------------------------------------------------------------
    # Block 2a: Plan-based allocation (when plan is fresh)
    # -----------------------------------------------------------------
    - variables:
        plan_jac: >
          {% if plan_is_fresh %}
            {{ plan_action in ['Jac', 'Jac+EV'] }}
          {% else %}
            false
          {% endif %}
        plan_ev: >
          {% if plan_is_fresh %}
            {{ plan_action in ['EV', 'Jac+EV'] }}
          {% else %}
            false
          {% endif %}
        plan_ev_amps: >
          {% if plan_is_fresh %}
            {{ states('input_number.energy_plan_ev_amps') | int(0) }}
          {% else %}
            0
          {% endif %}

    # -----------------------------------------------------------------
    # Block 2b: Legacy tier allocation (fallback when plan is stale)
    # -----------------------------------------------------------------
    - variables:
        # -- Tier 1: Trip-critical car --
        tier1_active: "{{ ev == 'X' }}"
        tier1_solar_w: >
          {% if ev == 'X' and remaining_0 | float >= ev_min_w | float %}
            {{ [remaining_0 | float, max_amps | int * voltage | float * phases | int] | min }}
          {% else %}
            0
          {% endif %}
        tier1_grid: "{{ ev == 'X' }}"
        remaining_1: "{{ remaining_0 | float - tier1_solar_w | float }}"

    - variables:
        # -- Tier 2: Battery evening charge --
        tier2_active: "{{ battery_needs_evening | bool and not high_tariff | bool }}"
        tier2_solar_w: >
          {% if tier2_active and remaining_1 | float > 0 %}
            {{ remaining_1 | float }}
          {% else %}
            0
          {% endif %}
        tier2_grid: "{{ tier2_active and low_tariff | bool }}"
        remaining_2: "{{ remaining_1 | float - tier2_solar_w | float }}"

    - variables:
        # -- Tier 3: Jacuzzi event (states C or D) --
        tier3_active: "{{ jac in ['C', 'D'] }}"
        tier3_solar_w: >
          {% if tier3_active and remaining_2 | float > 0 %}
            {{ [remaining_2 | float, jac_w | float] | min }}
          {% else %}
            0
          {% endif %}
        tier3_grid: >
          {% if not tier3_active %}
            false
          {% elif low_tariff | bool %}
            true
          {% elif high_tariff | bool %}
            {% set event_active = is_state('calendar.jacuzzi_schedule', 'on') %}
            {% set temp_dropping = state_attr('climate.jacuzzi', 'current_temperature') | float(40) < 39 %}
            {% set solar_blend = surplus | float >= 2250 %}
            {{ (event_active and temp_dropping) or solar_blend }}
          {% else %}
            false
          {% endif %}
        remaining_3: "{{ remaining_2 | float - tier3_solar_w | float }}"

    - variables:
        # -- Tier 4: Greenhouse dimming (future placeholder) --
        tier4_active: "{{ greenhouse_online | bool }}"
        remaining_4: "{{ remaining_3 | float }}"

    - variables:
        # -- Tier 5: Car buffer to 80% --
        tier5_active: "{{ ev == 'Y' and any_car_below_buffer | bool }}"
        tier5_solar_w: >
          {% if tier5_active and remaining_4 | float >= ev_min_w | float %}
            {{ [remaining_4 | float, max_amps | int * voltage | float * phases | int] | min }}
          {% else %}
            0
          {% endif %}
        tier5_grid: "{{ tier5_active and low_tariff | bool }}"
        remaining_5: "{{ remaining_4 | float - tier5_solar_w | float }}"

    - variables:
        # -- Tier 6: Jacuzzi standby/banking (state B) --
        tier6_active: "{{ jac == 'B' }}"
        tier6_solar_w: >
          {% if tier6_active and remaining_5 | float > 0 %}
            {{ [remaining_5 | float, jac_w | float] | min }}
          {% else %}
            0
          {% endif %}
        tier6_grid: "{{ tier6_active and low_tariff | bool }}"
        remaining_6: "{{ remaining_5 | float - tier6_solar_w | float }}"

    - variables:
        # -- Tier 7: Battery additional --
        tier7_active: "{{ battery_installed | bool and battery_soc | float < 100 }}"
        tier7_solar_w: >
          {% if tier7_active and remaining_6 | float > 0 %}
            {{ remaining_6 | float }}
          {% else %}
            0
          {% endif %}
        remaining_7: "{{ remaining_6 | float - tier7_solar_w | float }}"

    # -----------------------------------------------------------------
    # Block 3: Derive gate values — plan-first, legacy fallback
    # Safety tier 0 always overrides. Plan overrides legacy tiers.
    # -----------------------------------------------------------------
    - variables:
        # Jacuzzi allowed: safety override OR plan OR legacy tiers
        jacuzzi_allowed: >
          {% if jac == 'A' %}
            true
          {% elif jac == 'E' %}
            false
          {% elif plan_is_fresh %}
            {{ plan_jac | bool }}
          {% elif jac in ['C', 'D'] %}
            {{ tier3_solar_w | float > 0 or tier3_grid | bool }}
          {% elif jac == 'B' %}
            {{ tier6_solar_w | float > 0 or tier6_grid | bool }}
          {% else %}
            false
          {% endif %}

        # EV solar allowed: safety override OR plan OR legacy
        ev_solar_allowed: >
          {% if plan_is_fresh %}
            {{ plan_ev | bool and plan_ev_amps | int > 0 }}
          {% else %}
            {{ tier1_solar_w | float > 0 or tier5_solar_w | float > 0 }}
          {% endif %}

        # EV tariff allowed: safety override OR plan OR legacy
        ev_tariff_allowed: >
          {% if plan_is_fresh %}
            {{ plan_ev | bool }}
          {% else %}
            {{ tier1_grid | bool or tier5_grid | bool }}
          {% endif %}

        # EV max solar amps: plan amps OR legacy calculation
        ev_solar_amps: >
          {% if plan_is_fresh and plan_ev | bool %}
            {{ plan_ev_amps | int }}
          {% else %}
            {% set solar_w = tier1_solar_w | float if tier1_solar_w | float > 0 else tier5_solar_w | float %}
            {% if solar_w > 0 %}
              {% set raw = (solar_w / (voltage | float * phases | int)) | int %}
              {{ [[raw, min_amps | int] | max, max_amps | int] | min }}
            {% else %}
              0
            {% endif %}
          {% endif %}

        # Active tier
        active_tier: >
          {% if tier0_safety or tier0_greenhouse %}0
          {% elif plan_is_fresh %}
            {% if plan_action == 'Jac+EV' %}3
            {% elif plan_action == 'Jac' %}3
            {% elif plan_action == 'EV' %}5
            {% elif plan_action == 'Export' %}8
            {% else %}8{% endif %}
          {% elif tier1_active %}1
          {% elif tier2_active %}2
          {% elif tier3_active %}3
          {% elif tier4_active and greenhouse_online | bool %}4
          {% elif tier5_active %}5
          {% elif tier6_active %}6
          {% elif tier7_active %}7
          {% else %}8{% endif %}

        # Allocation JSON
        allocation: >
          {% if plan_is_fresh %}
            {{ {'source': 'plan',
                'plan_action': plan_action,
                'plan_ev_amps': plan_ev_amps | int,
                'surplus_w': surplus | float | round(0),
                'solar_available': solar_available,
                'tier0_safety': tier0_safety,
                'tier0_greenhouse': tier0_greenhouse
            } | tojson }}
          {% else %}
            {{ {'source': 'legacy_waterfall',
                'surplus_w': surplus | float | round(0),
                'remaining_w': remaining_7 | float | round(0),
                'solar_available': solar_available,
                'tier0_safety': tier0_safety,
                'tier0_greenhouse': tier0_greenhouse,
                'tier1_ev_trip_w': tier1_solar_w | float | round(0),
                'tier2_battery_w': tier2_solar_w | float | round(0),
                'tier3_jac_event_w': tier3_solar_w | float | round(0),
                'tier5_ev_buffer_w': tier5_solar_w | float | round(0),
                'tier6_jac_standby_w': tier6_solar_w | float | round(0),
                'tier7_battery_w': tier7_solar_w | float | round(0)
            } | tojson }}
          {% endif %}

    # -----------------------------------------------------------------
    # Block 4: Build decision summary
    # -----------------------------------------------------------------
    - variables:
        decision_summary: >
          {% set parts = [] %}
          {% if tier0_safety %}{% set parts = parts + ['T0:Safety'] %}{% endif %}
          {% if tier0_greenhouse %}{% set parts = parts + ['T0:Photoperiod'] %}{% endif %}
          {% if tier1_active %}
            {% if tier1_solar_w | float > 0 %}
              {% set parts = parts + ['T1:EV-trip@' ~ ev_solar_amps ~ 'A'] %}
            {% elif tier1_grid | bool %}
              {% set parts = parts + ['T1:EV-trip:grid'] %}
            {% endif %}
          {% endif %}
          {% if tier2_active %}{% set parts = parts + ['T2:Battery'] %}{% endif %}
          {% if tier3_active %}
            {% if tier3_solar_w | float > 0 %}
              {% set parts = parts + ['T3:Jac-event:solar'] %}
            {% elif tier3_grid | bool %}
              {% set parts = parts + ['T3:Jac-event:grid'] %}
            {% endif %}
          {% endif %}
          {% if tier5_active %}
            {% if tier5_solar_w | float > 0 %}
              {% set parts = parts + ['T5:EV-buf@' ~ ev_solar_amps ~ 'A'] %}
            {% elif tier5_grid | bool %}
              {% set parts = parts + ['T5:EV-buf:grid'] %}
            {% endif %}
          {% endif %}
          {% if tier6_active %}
            {% if tier6_solar_w | float > 0 %}
              {% set parts = parts + ['T6:Jac-standby:solar'] %}
            {% elif tier6_grid | bool %}
              {% set parts = parts + ['T6:Jac-standby:grid'] %}
            {% endif %}
          {% endif %}
          {% if tier7_active %}{% set parts = parts + ['T7:Battery+'] %}{% endif %}
          {{ parts | join(', ') if parts else 'T8:Export' }}
        decision_log: >
          T{{ active_tier }}: {{ decision_summary }}{{ ' [solar-unavail]' if not solar_available else '' }} @ {{ now().strftime('%H:%M:%S') }}

    # -----------------------------------------------------------------
    # Block 5: Set output helpers
    # -----------------------------------------------------------------
    # Legacy gates (backward compat)
    - if:
        - condition: template
          value_template: "{{ jacuzzi_allowed | bool }}"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.energy_jacuzzi_heat_allowed
      else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.energy_jacuzzi_heat_allowed

    - if:
        - condition: template
          value_template: "{{ ev_solar_allowed | bool }}"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.energy_ev_solar_charge_allowed
      else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.energy_ev_solar_charge_allowed

    - if:
        - condition: template
          value_template: "{{ ev_tariff_allowed | bool }}"
      then:
        - action: input_boolean.turn_on
          target:
            entity_id: input_boolean.energy_ev_tariff_charge_allowed
      else:
        - action: input_boolean.turn_off
          target:
            entity_id: input_boolean.energy_ev_tariff_charge_allowed

    - action: input_number.set_value
      target:
        entity_id: input_number.energy_ev_max_solar_amps
      data:
        value: "{{ ev_solar_amps | int }}"

    # New waterfall outputs
    - action: input_number.set_value
      target:
        entity_id: input_number.energy_orchestrator_active_tier
      data:
        value: "{{ active_tier | int }}"

    - action: input_select.set_options
      target:
        entity_id: input_select.energy_orchestrator_allocation_json
      data:
        options:
          - "{{ allocation[:255] }}"

    # Heartbeat
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.energy_orchestrator_last_heartbeat
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # Decision log
    - action: input_select.set_options
      target:
        entity_id: input_select.energy_last_decision
      data:
        options:
          - "{{ decision_log[:255] }}"

    # Watchdog integration: log once when degraded, don't spam every 30s
    - if:
        - condition: template
          value_template: >
            {{ watchdog == 'critical'
               and 'watchdog_degraded' not in (states('input_select.energy_last_decision') | default('')) }}
      then:
        - action: shell_command.log_decision
          data:
            system: orchestrator
            automation_id: auto_energy_001
            decision_code: watchdog_degraded
            decision_text: "Waterfall running with degraded watchdog"
            context: >
              {{ {'watchdog': watchdog,
                  'solar_available': solar_available,
                  'active_tier': active_tier | int
              } | tojson }}


# =============================================================================
# 026 – PRE-PEAK READINESS CHECK
# At 15:00 on weekdays, checks if systems are ready for the 17:00–22:00 peak.
# Logs readiness to MariaDB and alerts Fraser if not ready.
# =============================================================================
- id: auto_energy_026_pre_peak_readiness
  alias: "Energy 026 – Pre-Peak Readiness Check"
  description: >
    At 15:00 weekdays, checks battery at evening target, jacuzzi at event temp,
    cars at buffer target. Logs readiness and alerts Fraser if not ready.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: time
      at: "15:00:00"

  conditions:
    - condition: template
      value_template: "{{ now().weekday() in [0, 1, 2, 3, 4] }}"

  actions:
    - variables:
        # Battery readiness
        battery_installed: "{{ is_state('input_boolean.energy_battery_installed', 'on') }}"
        battery_ready: >
          {% if not battery_installed %}
            true
          {% else %}
            {% set available = states('sensor.energy_battery_available_kwh') | float(0) %}
            {% set target = states('input_number.energy_battery_evening_target_kwh') | float(8) %}
            {{ available >= target }}
          {% endif %}

        # Jacuzzi readiness — check if event tonight and at temp
        jac_temp: "{{ state_attr('climate.jacuzzi', 'current_temperature') | float(0) }}"
        jac_event_tonight: >
          {% set cal = states.calendar.jacuzzi_schedule %}
          {% if cal is not none and cal.attributes.start_time is defined %}
            {% set event_ts = as_timestamp(cal.attributes.start_time) %}
            {% set now_ts = as_timestamp(now()) %}
            {{ event_ts > now_ts and event_ts < (now_ts + 32400) }}
          {% else %}
            false
          {% endif %}
        jac_ready: >
          {% if not jac_event_tonight %}
            true
          {% else %}
            {{ jac_temp | float >= 38 }}
          {% endif %}

        # EV readiness — both home cars at buffer target
        buffer_target: "{{ states('input_number.energy_ev_buffer_target_soc') | float(80) }}"
        horace_soc: "{{ states('input_number.ev_horace_current_soc') | float(0) }}"
        horatio_soc: "{{ states('input_number.ev_horatio_current_soc') | float(0) }}"
        horace_home: "{{ is_state('device_tracker.horace_location', 'home') }}"
        horatio_home: "{{ is_state('device_tracker.horatio_location', 'home') }}"
        ev_ready: >
          {{ (not horace_home or horace_soc | float >= buffer_target | float)
             and (not horatio_home or horatio_soc | float >= buffer_target | float) }}

        all_ready: "{{ battery_ready | bool and jac_ready | bool and ev_ready | bool }}"

    - variables:
        issues: >
          {% set items = [] %}
          {% if not battery_ready | bool %}{% set items = items + ['Battery below evening target'] %}{% endif %}
          {% if not jac_ready | bool %}{% set items = items + ['Jacuzzi at ' ~ jac_temp ~ '°C (event tonight)'] %}{% endif %}
          {% if not ev_ready | bool %}
            {% if horace_home and horace_soc | float < buffer_target | float %}
              {% set items = items + ['Horace at ' ~ horace_soc ~ '% (target ' ~ buffer_target ~ '%)'] %}
            {% endif %}
            {% if horatio_home and horatio_soc | float < buffer_target | float %}
              {% set items = items + ['Horatio at ' ~ horatio_soc ~ '% (target ' ~ buffer_target ~ '%)'] %}
            {% endif %}
          {% endif %}
          {{ items | join(', ') if items else 'All systems ready' }}

    - action: shell_command.log_decision
      data:
        system: orchestrator
        automation_id: auto_energy_026
        decision_code: "{{ 'pre_peak_ready' if all_ready | bool else 'pre_peak_not_ready' }}"
        decision_text: "Pre-peak check: {{ 'READY' if all_ready | bool else 'NOT READY — ' ~ issues }}"
        context: >
          {{ {'battery_ready': battery_ready | bool,
              'jac_ready': jac_ready | bool,
              'jac_event_tonight': jac_event_tonight | bool,
              'jac_temp': jac_temp | float,
              'ev_ready': ev_ready | bool,
              'horace_soc': horace_soc | float,
              'horatio_soc': horatio_soc | float,
              'buffer_target': buffer_target | float
          } | tojson }}

    - if:
        - condition: template
          value_template: "{{ not all_ready | bool }}"
      then:
        - action: notify.mobile_app_fraser_s_iphone
          data:
            title: "Pre-Peak Not Ready"
            message: "{{ issues }}. Peak starts at 17:00."
            data:
              push:
                interruption-level: time-sensitive


# =============================================================================
# 060 – DECISION LOGGER
# Logs orchestrator decisions to the HA logbook for audit trail.
# Triggers when the decision sensor state changes (new scenario or action).
# =============================================================================
- id: auto_energy_060_decision_log
  alias: "Energy 060 – Decision Logger"
  description: >
    Logs orchestrator decisions to the HA logbook whenever the evaluated
    scenario or recommended action changes. Provides an audit trail for
    shadow mode validation.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id: sensor.energy_orchestrator_decision

  conditions:
    - condition: template
      value_template: >
        {{ trigger.from_state is not none
           and trigger.from_state.state != trigger.to_state.state
           and trigger.to_state.state not in ['unknown', 'unavailable'] }}

  actions:
    - action: logbook.log
      data:
        name: "Energy Orchestrator"
        message: "{{ states('sensor.energy_orchestrator_decision') }}"
        entity_id: sensor.energy_orchestrator_decision

    - variables:
        decision_state: "{{ states('sensor.energy_orchestrator_decision') }}"
        decision_code: "{{ decision_state.split(':')[0] | trim if ':' in decision_state else decision_state }}"
    - action: shell_command.log_decision
      data:
        system: orchestrator
        automation_id: auto_energy_060
        decision_code: "{{ decision_code }}"
        decision_text: "{{ decision_state }}"
        context: >
          {{ {'scenario': decision_code,
              'active_tier': states('input_number.energy_orchestrator_active_tier') | int(8),
              'tier_name': state_attr('sensor.energy_orchestrator_tier', 'tier_name') | default('Unknown'),
              'surplus': states('sensor.energy_solar_surplus_w') | float(0) | round(0),
              'low_tariff': is_state('binary_sensor.energy_low_tariff_active', 'on'),
              'jac_state': states('sensor.energy_jacuzzi_demand_scenario'),
              'ev_state': states('sensor.energy_ev_demand_scenario'),
              'prod_state': states('sensor.energy_production_scenario'),
              'jac_allowed': is_state('input_boolean.energy_jacuzzi_heat_allowed', 'on'),
              'ev_solar_allowed': is_state('input_boolean.energy_ev_solar_charge_allowed', 'on'),
              'ev_tariff_allowed': is_state('input_boolean.energy_ev_tariff_charge_allowed', 'on'),
              'allocation': states('input_select.energy_orchestrator_allocation_json')
          } | tojson }}


# =============================================================================
# 061 – CONFLICT ALERT
# Notifies when the orchestrator detects competing demands that cannot both
# be fully served by available solar. This is informational in shadow mode.
#
# Conflict definition: both jacuzzi and EV have active demand, but the
# production scenario is 1 or 2 (insufficient for both loads).
# =============================================================================
- id: auto_energy_061_conflict_alert
  alias: "Energy 061 – Conflict Alert"
  description: >
    Sends a persistent notification when the orchestrator detects competing
    energy demands that cannot be fully resolved with available solar surplus.
    Uses persistent_notification so repeated fires replace rather than stack.
  mode: single
  trace:
    stored_traces: 10

  triggers:
    - trigger: state
      entity_id:
        - sensor.energy_production_scenario
        - sensor.energy_jacuzzi_demand_scenario
        - sensor.energy_ev_demand_scenario

  conditions:
    # DISABLED — redundant with Energy 065 (conflict detail) which has
    # orchestrator-enabled gate + 15-min cooldown. This fired on every
    # sensor fluctuation with no cooldown, spamming notifications.
    - condition: template
      value_template: "{{ false }}"
    - condition: template
      value_template: >
        {% set jac = states('sensor.energy_jacuzzi_demand_scenario') %}
        {% set ev = states('sensor.energy_ev_demand_scenario') %}
        {% set prod = states('sensor.energy_production_scenario') %}
        {% set jac_active = jac not in ['E', 'unknown', 'unavailable'] %}
        {% set ev_active = ev not in ['idle', 'unknown', 'unavailable'] %}
        {% set insufficient = prod in ['1', '2'] %}
        {{ jac_active and ev_active and insufficient }}

  actions:
    - action: notify.mobile_app_fraser_s_iphone
      data:
        title: "Energy Orchestrator – Solar Contention"
        message: >
          Competing demands with insufficient solar.
          Prod: {{ states('sensor.energy_production_scenario') }}
          Jac: {{ states('sensor.energy_jacuzzi_demand_scenario') }}
          EV: {{ states('sensor.energy_ev_demand_scenario') }}
          Surplus: {{ states('sensor.energy_solar_surplus_w') | float(0) | round(0) }}W
          Decision: {{ states('sensor.energy_orchestrator_decision') }}
        data:
          tag: energy_orchestrator_conflict

    - action: shell_command.log_decision
      data:
        system: orchestrator
        automation_id: auto_energy_061
        decision_code: conflict
        decision_text: >
          Conflict: prod={{ states('sensor.energy_production_scenario') }}
          jac={{ states('sensor.energy_jacuzzi_demand_scenario') }}
          ev={{ states('sensor.energy_ev_demand_scenario') }}
        context: >
          {{ {'jac_state': states('sensor.energy_jacuzzi_demand_scenario'),
              'ev_state': states('sensor.energy_ev_demand_scenario'),
              'prod_state': states('sensor.energy_production_scenario'),
              'surplus': states('sensor.energy_solar_surplus_w') | float(0) | round(0)
          } | tojson }}
